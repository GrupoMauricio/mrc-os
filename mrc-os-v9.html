<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MRC OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#09090F;color:#EEEAF8;overflow:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#252535;border-radius:4px}

/* ── KEYFRAMES ── */
@keyframes in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 var(--a-20)}60%{box-shadow:0 0 0 8px transparent}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:in .22s ease both}
.blink{animation:pulse 1.4s ease-in-out infinite}

/* ── LAYOUT ── */
#wrap{display:flex;flex-direction:column;height:100vh}
#top{height:46px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--border);background:var(--surf);flex-shrink:0;transition:border-color .4s,background .4s}
#body{display:flex;flex:1;overflow:hidden}
#side{width:216px;min-width:216px;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surf);transition:all .25s;flex-shrink:0}
#side.col{width:52px;min-width:52px}
#main{flex:1;overflow-y:auto;overflow-x:hidden}
.page-wrap{padding:26px 30px;max-width:940px}

/* ── CSS VARS (default = neutral) ── */
:root{
  --a:#7C3AED;--a-10:rgba(124,58,237,.10);--a-20:rgba(124,58,237,.20);--a-40:rgba(124,58,237,.40);
  --bg:#09090F;--surf:#0D0D16;--card:#131320;--card2:#181828;--border:rgba(255,255,255,.07);
  --txt:rgba(255,255,255,1);--txt2:rgba(255,255,255,.55);--txt3:rgba(255,255,255,.25);
}

/* ── SIDEBAR ── */
.s-logo{padding:12px 11px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden}
.s-mark{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.s-name{font-size:13px;font-weight:800;white-space:nowrap;line-height:1.1}
.s-ver{font-size:9px;color:var(--txt3);font-family:'JetBrains Mono',monospace}
.nav-wrap{flex:1;overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:1px}
.ns{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt3);padding:10px 8px 4px;white-space:nowrap;overflow:hidden}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--txt3);width:100%;text-align:left;transition:background .14s,color .14s;white-space:nowrap;overflow:hidden;font-family:inherit;font-size:12px;font-weight:500}
.ni:hover{background:rgba(255,255,255,.05);color:var(--txt2)}
.ni.on{background:var(--a-10);color:var(--a)}
.ni-ico{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.ni-lbl{flex:1}
.ni-tag{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;background:rgba(255,255,255,.07);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.ni-dot{width:5px;height:5px;border-radius:50%;background:#EF4444;flex-shrink:0}
.s-foot{padding:8px 6px;border-top:1px solid var(--border);flex-shrink:0}
.col-btn{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--txt3);width:100%;font-family:inherit;font-size:12px;transition:all .14s}
.col-btn:hover{background:rgba(255,255,255,.05);color:var(--txt2)}

/* ── TOPBAR ── */
.t-ctx{display:flex;align-items:center;gap:7px}
.t-dot{width:7px;height:7px;border-radius:50%;background:var(--a);box-shadow:0 0 10px var(--a);flex-shrink:0;transition:all .4s}
.t-lbl{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;color:var(--a);transition:color .4s}
.t-sp{flex:1}
.t-alert{display:flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#EF4444;font-size:10px;font-weight:700;cursor:pointer}
.t-timer{display:flex;align-items:center;gap:7px;padding:3px 11px 3px 9px;border-radius:20px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)}
.t-xp{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:#A855F7;font-family:'JetBrains Mono',monospace}
.t-clock{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 12px}
.t-hm{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;line-height:1}
.t-sec{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);line-height:1}
.t-date{font-size:9px;color:var(--txt3);text-transform:capitalize;margin-top:1px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.card-s{padding:14px}
.card-accent{border-left:3px solid var(--a)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* ── TYPE ── */
.pg-title{font-size:22px;font-weight:800;margin-bottom:3px}
.label{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--txt3);margin-bottom:6px}
.label-a{color:var(--a)}
.dim{color:var(--txt2);font-size:12px}
.dim-sm{color:var(--txt3);font-size:11px}
.mono{font-family:'JetBrains Mono',monospace}

/* ── BAR ── */
.bar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bar-h{height:8px}
.bar-f{height:100%;border-radius:99px;transition:width .6s ease}

/* ── PILL ── */
.pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* ── STATUS LIGHT ── */
.light{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.green{background:#16A854;box-shadow:0 0 6px rgba(22,168,84,.5)}
.yellow{background:#E8A820;box-shadow:0 0 6px rgba(232,168,32,.5)}
.red{background:#EF4444;box-shadow:0 0 6px rgba(239,68,68,.5)}
.gray{background:rgba(255,255,255,.2)}

/* ── INPUT ── */
.inp{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;color:var(--txt);font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 10px;outline:none;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--a)}
.inp::placeholder{color:var(--txt3)}
select.inp{cursor:pointer}
.fin-n{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:5px 8px;width:110px;outline:none;text-align:right;transition:border-color .15s}
.fin-n:focus{border-color:var(--a)}

/* ── BTN ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;transition:all .15s}
.btn-a{color:#09090F}
.btn-g{background:rgba(255,255,255,.07);color:var(--txt2)}
.btn-g:hover{background:rgba(255,255,255,.12);color:var(--txt)}
.btn-sm{padding:4px 10px;font-size:11px}

/* ── TASK ── */
.task{display:flex;gap:0;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:7px;transition:border-color .2s}
.task:hover{border-color:rgba(255,255,255,.14)}
.task.blocked{opacity:.45}
.task.done{opacity:.38}
.t-bar{width:3px;flex-shrink:0}
.t-body{flex:1;padding:10px 12px}
.t-name{font-size:13px;font-weight:600;line-height:1.3}
.t-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.chk{width:17px;height:17px;border-radius:4px;border:1.5px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:800;color:transparent;transition:all .18s;user-select:none;margin-top:1px}
.chk.on{color:white}
.lock-icon{font-size:11px;color:var(--txt3);flex-shrink:0}

/* ── PIPELINE ── */
.pipe-col{flex:1;min-width:0}
.pipe-hd{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none}
.pipe-body{border:1px solid var(--border);border-radius:0 0 8px 8px;padding:10px;min-height:80px;display:flex;flex-direction:column;gap:6px}
.pipe-item{padding:9px 11px;border-radius:7px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--card2)}
.pipe-item:hover{border-color:rgba(255,255,255,.18)}
.pipe-item.locked{opacity:.4;cursor:default}
.pipe-empty{font-size:11px;color:var(--txt3);text-align:center;padding:12px 0}

/* ── DELIVERY ── */
.del{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.del:last-child{border-bottom:none}
.urg{font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.25);font-weight:700;flex-shrink:0}

/* ── EXTRA ── */
.extra{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;background:var(--card2);border-radius:8px;border:1px solid var(--border);margin-bottom:6px}
.add-form{display:none;background:var(--card2);border-radius:9px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}

/* ── HEALTH CARD ── */
.biz-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.biz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a);opacity:.6}
.biz-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.biz-card.biz-green::before{background:#16A854}
.biz-card.biz-yellow::before{background:#E8A820}
.biz-card.biz-red::before{background:#EF4444}
.biz-card.biz-gray::before{background:rgba(255,255,255,.2)}

/* ── STAT BLOCK ── */
.stat{background:var(--card2);border-radius:9px;padding:12px}
.stat-v{font-size:22px;font-weight:800;line-height:1;margin-bottom:2px}
.stat-l{font-size:10px;color:var(--txt3);font-weight:500}

/* ── NEXT ACTION ── */
.next-action{background:var(--a-10);border:1px solid var(--a-20);border-radius:11px;padding:14px 16px;margin-bottom:12px}

/* ── SAT RING ── */
.sat-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}

/* ── TOGGLE ── */
.tog{display:flex;background:var(--card2);border-radius:8px;padding:3px;gap:2px;margin-bottom:14px}
.tog-btn{flex:1;padding:5px 10px;border-radius:6px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;background:transparent;color:var(--txt3);transition:all .15s}
.tog-btn.on{background:var(--card);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.3)}
</style>
</head>
<body>
<div id="wrap">
  <div id="top">
    <div class="t-ctx">
      <div class="t-dot" id="t-dot"></div>
      <span class="t-lbl" id="t-lbl">Central</span>
    </div>
    <div id="t-alert"></div>
    <div class="t-sp"></div>
    <div id="t-timer" style="display:none" class="t-timer">
      <div class="blink" style="width:5px;height:5px;border-radius:50%;background:#EF4444"></div>
      <span class="mono" style="font-size:13px;font-weight:700;color:#EF4444" id="t-timer-disp">00:00</span>
      <span id="t-timer-lbl" style="font-size:10px;color:var(--txt3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button onclick="timerStop()" style="background:none;border:none;color:#EF4444;cursor:pointer;font-size:11px;padding:0 0 0 3px;opacity:.7">⏹</button>
    </div>
    <div class="t-xp" id="t-xp">⚡ 0</div>
    <div class="t-clock">
      <div style="display:flex;align-items:baseline;gap:2px">
        <span class="t-hm" id="t-hm">--:--</span>
        <span class="t-sec" id="t-sec">:--</span>
      </div>
      <div class="t-date" id="t-date"></div>
    </div>
  </div>
  <div id="body">
    <div id="side">
      <div class="s-logo">
        <div class="s-mark" id="s-mark">⚡</div>
        <div id="s-txt">
          <div class="s-name">MRC OS</div>
          <div class="s-ver">v9 · 2025</div>
        </div>
      </div>
      <div class="nav-wrap" id="nav-wrap">
        <button class="ni on" data-p="home" onclick="go('home')"><span class="ni-ico">⚡</span><span class="ni-lbl">Central</span></button>
        <div class="ns" id="ns1">Meus Negócios</div>
        <button class="ni" data-p="nextlevel"   onclick="go('nextlevel')"  ><span class="ni-ico">🟡</span><span class="ni-lbl">NextLevel</span>     <span class="ni-dot"></span><span class="ni-tag" id="nb-nl" style="color:#E8A820">3</span></button>
        <button class="ni" data-p="brasdigital" onclick="go('brasdigital')"><span class="ni-ico">🟠</span><span class="ni-lbl">Brás Digital</span> <span class="ni-tag" id="nb-bd">base</span></button>
        <button class="ni" data-p="mauriciocrm" onclick="go('mauriciocrm')"><span class="ni-ico">🔵</span><span class="ni-lbl">MauricioCRM</span>  <span class="ni-tag" id="nb-crm">SaaS</span></button>
        <button class="ni" data-p="megatron"    onclick="go('megatron')"  ><span class="ni-ico">🔴</span><span class="ni-lbl">Mega Tron</span>     <span class="ni-dot"></span><span class="ni-tag" id="nb-mt" style="color:#EF4444">ML</span></button>
        <button class="ni" data-p="mentorias"   onclick="go('mentorias')" ><span class="ni-ico">🟣</span><span class="ni-lbl">Mentorias</span>     <span class="ni-tag" id="nb-men">lançar</span></button>
        <button class="ni" data-p="amazonia"    onclick="go('amazonia')"  ><span class="ni-ico">🌎</span><span class="ni-lbl">AmazonIA+IDESA</span><span class="ni-tag" id="nb-az">plano</span></button>
        <div class="ns" id="ns2">Clientes</div>
        <button class="ni" data-p="alphaoutfit" onclick="go('alphaoutfit')"><span class="ni-ico">👕</span><span class="ni-lbl">Alpha Outfit</span> <span class="ni-tag" id="nb-ao">—</span></button>
        <button class="ni" data-p="viitss"      onclick="go('viitss')"    ><span class="ni-ico">🎽</span><span class="ni-lbl">ViiTss</span>        <span class="ni-tag" id="nb-vt">—</span></button>
        <button class="ni" data-p="cusimodas"   onclick="go('cusimodas')" ><span class="ni-ico">👔</span><span class="ni-lbl">Cusi Modas</span>    <span class="ni-tag" id="nb-cm">—</span></button>
        <div class="ns" id="ns3">Ferramentas</div>
        <button class="ni" data-p="timer"  onclick="go('timer')" ><span class="ni-ico">⏱</span><span class="ni-lbl">Cronômetro</span><span class="ni-tag" id="nb-tmr" style="display:none;color:#EF4444">●</span></button>
        <button class="ni" data-p="config" onclick="go('config')"><span class="ni-ico">⚙️</span><span class="ni-lbl">Config</span></button>
      </div>
      <div class="s-foot">
        <div style="padding:0 8px 8px" id="s-xp-wrap">
          <div style="font-size:9px;color:var(--a);font-weight:700;margin-bottom:4px;font-family:'JetBrains Mono',monospace" id="s-lvl">Fundador Solo</div>
          <div class="bar"><div class="bar-f" id="s-xp-bar" style="background:var(--a);width:0%"></div></div>
          <div style="font-size:9px;color:var(--txt3);margin-top:3px;font-family:'JetBrains Mono',monospace" id="s-xp-txt">0 XP</div>
        </div>
        <button class="col-btn" onclick="colSide()">
          <span style="font-size:13px;width:20px;text-align:center" id="col-ico">←</span>
          <span id="col-lbl">Recolher</span>
        </button>
      </div>
    </div>
    <div id="main"></div>
  </div>
</div>

<script>

   DATA
════════════════════════════════════════════════════════════ */

const fT=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${h}:${z(m)}:${z(sc)}`:`${z(m)}:${z(sc)}`;};

/* satisfaction */
function sat(cid){
  if(st.satOvr[cid]!==undefined)return st.satOvr[cid];
  const c=CLIENTS[cid];const saved=st.deliveries[cid]||{};
  const done=c.deliveries.filter(d=>(saved[d.id]!==undefined?saved[d.id]:d.done)).length;
  return Math.round((done/Math.max(c.deliveries.length,1))*100);
}
function healthColor(cid){const v=sat(cid);return v>=80?'green':v>=60?'yellow':'red';}
function urgCount(){
  let n=0;Object.values(CLIENTS).forEach(c=>{
    const saved=st.deliveries[c.id]||{};
    c.deliveries.forEach(d=>{if(!(saved[d.id]!==undefined?saved[d.id]:d.done)&&isUrg(d.due))n++;});
  });return n;
}

function togDel(id,did){
  if(!st.deliveries[id])st.deliveries[id]={};
  const c=CLIENTS[id];const d=c.deliveries.find(x=>x.id===did);
  const was=st.deliveries[id][did]!==undefined?st.deliveries[id][did]:d.done;
  st.deliveries[id][did]=!was;
  if(!was)st.xp+=10;else st.xp=Math.max(0,st.xp-10);
  save();renderDeliveries(id);updateTop();
}
function togExtra(id,eid){
  st.extras[id]=(st.extras[id]||[]).map(e=>e.id===eid?{...e,done:!e.done}:e);
  save();renderExtras(id);
}

  const pr=document.getElementById('epr-'+id)?.value||'normal';
  if(!st.extras[id])st.extras[id]=[];
  st.extras[id].push({id:id+'-e'+Date.now(),t,deadline:dl,priority:pr,done:false});
  save();toggleForm(id);renderExtras(id);
}
function setSat(id,v){st.satOvr[id]=v;save();renderClient(document.getElementById('main'),id);updateTop();}

/* ════════════════════════════════════════════════════════════
   TIMER PAGE
════════════════════════════════════════════════════════════ */
function renderTimer(el){
  el.innerHTML=`<div class="page-wrap fade" style="max-width:560px">
  <div class="pg-title" style="margin-bottom:18px">⏱ Cronômetro</div>
  <div class="card" style="text-align:center;padding:32px 24px;border-color:${tmrRunning?'rgba(239,68,68,.4)':'var(--border)'}">
    <div id="timer-disp" class="mono" style="font-size:56px;font-weight:700;letter-spacing:4px;color:${tmrRunning?'#EF4444':'var(--txt)'};margin-bottom:16px">${fT(tmrSecs)}</div>
    <input id="tmr-lbl-inp" class="inp" value="${tmrLabel}" placeholder="Nome da sessão..."
      oninput="tmrLabel=this.value;document.getElementById('t-timer-lbl').textContent=this.value"
      style="max-width:320px;margin:0 auto 16px;text-align:center;display:block">
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button onclick="tmrRunning?tmrPause():tmrStart();if(pg==='timer')render()" class="btn"
        style="background:${tmrRunning?'rgba(255,255,255,.08)':'#EF4444'};color:${tmrRunning?'var(--txt)':'white'};padding:10px 28px;font-size:14px">
        ${tmrRunning?'⏸ Pausar':'▶ Iniciar'}
      </button>
      <button onclick="timerStop()" class="btn"
        style="background:rgba(239,68,68,.12);color:#EF4444;border:1px solid rgba(239,68,68,.28);padding:10px 18px">
        ⏹ Parar
      </button>
      <button onclick="tmrSecs=0;tmrRunning=false;clearInterval(tmrIv);if(pg==='timer')render()" class="btn btn-g" style="padding:10px 14px">↺</button>
    </div>
  </div>
  </div>`;
  if(tmrRunning){clearInterval(tmrIv);tmrIv=setInterval(tmrTick,1000);}
}

/* ════════════════════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════════════════════ */
function renderConfig(el){
  el.innerHTML=`<div class="page-wrap fade" style="max-width:500px">
  <div class="pg-title" style="margin-bottom:18px">⚙️ Config</div>
  <div class="card">
    <div class="label">Dados</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
      <button class="btn btn-g" onclick="exportData()">📥 Exportar progresso</button>
      <button class="btn" style="background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.25)"
        onclick="if(confirm('Resetar tudo?')&&confirm('Confirme novamente.')){localStorage.removeItem('mrc9');location.reload();}">
        ⚠ Resetar tudo
      </button>
    </div>
    <div style="margin-top:14px;padding:12px;background:var(--card2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--txt3);line-height:1.8">
      XP: ${st.xp} · Nível: ${lvl().n}<br>
      Tarefas concluídas: ${Object.keys(st.taskDone).filter(k=>st.taskDone[k]).length}<br>
      Entregas concluídas: ${Object.values(st.deliveries).flatMap(Object.values).filter(Boolean).length}<br>
      MRC OS v9 · 2025
    </div>
  </div>
  </div>`;
}

function exportData(){
  const lines=['# MRC OS — Progresso exportado',new Date().toLocaleDateString('pt-BR'),
    '','## Tarefas Concluídas',
    ...Object.entries(st.taskDone).filter(([,v])=>v).map(([k])=>'- '+k),
    '','## XP: '+st.xp,'Nível: '+lvl().n,
  ];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download='mrc-progress.txt';a.click();
}

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
applyT('home');
updateTop();
render();
</script>
