/* ─── UTILS ───────────────────────────────────────────────── */
const f=(n)=>"R$ "+Math.round(n).toLocaleString("pt-BR");
const pct=(a,b)=>b?Math.min(100,Math.max(0,(a/b)*100)):0;
const shuffle=(arr)=>[...arr].sort(()=>Math.random()-.5);
const getFin=(p)=>{
  const expBase=p.expenses.reduce((s,e)=>s+e.value,0)+p.children*p.childCost;
  const liabPay=p.liabilities.reduce((s,l)=>s+(l.payment||0),0);
  const totalExp=expBase+liabPay;
  const passive=p.assets.reduce((s,a)=>s+a.cashflow,0)+p.passiveIncomes.reduce((s,i)=>s+i.amount,0);
  const totalInc=p.salary+passive;
  const cf=totalInc-totalExp;
  const netWorth=p.savings+p.assets.reduce((s,a)=>s+(a.value||a.cost||0),0)-p.liabilities.reduce((s,l)=>s+l.value,0);
  return {totalExp,passive,totalInc,cf,netWorth,progress:pct(passive,totalExp)};
};
const milestone=(prog)=>prog>=100?100:prog>=75?75:prog>=50?50:prog>=25?25:0;

function GameScreen({initPlayer,lang,onRestart}){
  const [player,setPlayer]=useState(initPlayer);
  const [tab,setTab]=useState(0);
  const [dice,setDice]=useState([1,1]);
  const [rolling,setRolling]=useState(false);
  const [hasRolled,setHasRolled]=useState(false);
  const [round,setRound]=useState(1);
  const [actionCard,setActionCard]=useState(null);
  const [missedCard,setMissedCard]=useState(null);
  const [boldCard,setBoldCard]=useState(null);
  const [skipping,setSkipping]=useState(0);
  const [milestoneJust,setMilestoneJust]=useState(null);
  const [showFastTrackModal,setShowFastTrackModal]=useState(false);
  const [victor,setVictor]=useState(false);
  const prevMilestone=useRef(0);
  const decks=useRef({opp:shuffle(CARDS.opp),market:shuffle(CARDS.market),doodad:shuffle(CARDS.doodad)});
  const t=TR[lang], fin=getFin(player);
  const updP=(fn)=>setPlayer(p=>typeof fn==="function"?fn(p):fn);
  const draw=(type)=>{let d=decks.current[type];if(!d.length)d=decks.current[type]=shuffle(CARDS[type]);return d.pop();};
  
  useEffect(()=>{const m=milestone(fin.progress);if(m>prevMilestone.current&&m>0&&m<100){setMilestoneJust(m);prevMilestone.current=m;}if(fin.progress>=100&&!player.onFastTrack&&!showFastTrackModal){setShowFastTrackModal(true);}if(player.onFastTrack&&fin.progress>=150&&!victor){setVictor(true);}},[fin.progress,player.onFastTrack]);
  
  const log=(text,color=C.t2)=>updP(p=>({...p,log:[...p.log,{text,color}]}));
  const endTurn=()=>{setHasRolled(false);setRound(r=>r+1);};
  const applySquare=(sq)=>{
    SFX.land();
    if(sq==="payday"){SFX.payday();setActionCard({card:{title:{pt:"PAYDAY",es:"DÍA DE PAGO"},desc:{pt:"Receba seu fluxo de caixa mensal.",es:"Recibe tu flujo mensual."}},sqType:"payday"});return;}
    if(sq==="opp"){SFX.modal();setActionCard({card:draw("opp"),sqType:"opp"});return;}
    if(sq==="market"){SFX.modal();setActionCard({card:draw("market"),sqType:"market"});return;}
    if(sq==="doodad"){SFX.doodad();setActionCard({card:draw("doodad"),sqType:"doodad"});return;}
    if(sq==="charity"){SFX.modal();setActionCard({card:{title:{pt:"Caridade",es:"Caridad"},desc:{pt:"Doe 10% do seu fluxo de caixa para rolar 3 dados nos próximos 3 turnos.",es:"Dona 10% de tu flujo para tirar 3 dados."}},sqType:"charity"});return;}
    if(sq==="baby"){SFX.baby();updP(p=>({...p,children:p.children+1,log:[...p.log,{text:t.newChild,color:C.orange}]}));endTurn();return;}
    if(sq==="downsize"){SFX.fired();setSkipping(2);updP(p=>({...p,savings:Math.max(0,p.savings-p.expenses.reduce((s,e)=>s+e.value,0)),log:[...p.log,{text:t.fired,color:C.red}]}));endTurn();return;}
    // fast track
    if(["biz","dream"].includes(sq)){setActionCard({card:{title:{pt:sq==="biz"?"Grande Negócio":"Sonho",es:sq==="biz"?"Gran Negocio":"Sueño"},desc:{pt:"Oportunidade da pista rápida.",es:"Oportunidad de pista rápida."},cost:25000,cashflow:3000,type:"business",symbol:"BIG",roi:144,potential:60000},sqType:"opp"});return;}
    if(sq==="cash"){setActionCard({card:{title:{pt:"Cashflow Extra",es:"Cashflow Extra"},desc:{pt:"Receba 100x seu fluxo de caixa.",es:"Recibe 100x tu flujo."}},sqType:"payday"});return;}
    if(sq==="market"){setActionCard({card:draw("market"),sqType:"market"});return;}
  };
  
  const roll=()=>{
    if(rolling||hasRolled)return;
    if(skipping>0){SFX.skip();setSkipping(s=>s-1);log(t.skipped,C.red);endTurn();return;}
    SFX.roll();setRolling(true);
    let count=0;const iv=setInterval(()=>{setDice([1+Math.floor(Math.random()*6),1+Math.floor(Math.random()*6)]);SFX.dice();count++;if(count>=8){clearInterval(iv);const d1=1+Math.floor(Math.random()*6),d2=1+Math.floor(Math.random()*6);setDice([d1,d2]);const sum=d1+d2;setRolling(false);setHasRolled(true);SFX.move();setTimeout(()=>{
      if(player.onFastTrack){const newPos=(player.outerPosition+sum)%FAST_SQUARES.length;updP(p=>({...p,outerPosition:newPos}));setTimeout(()=>applySquare(FAST_SQUARES[newPos]),300);}
      else{let newPos=(player.position+sum)%RAT_SQUARES.length;const passed=newPos<player.position;if(passed){updP(p=>({...p,savings:p.savings+fin.cf,position:newPos,log:[...p.log,{text:`${t.passedPayday}: ${f(fin.cf)}`,color:C.green}]}));}else updP(p=>({...p,position:newPos}));setTimeout(()=>applySquare(RAT_SQUARES[newPos]),300);}
    },200);}},80);
  };
  
  const handleAction=(card)=>{
    const sqType=actionCard.sqType;
    if(sqType==="payday"){updP(p=>({...p,savings:p.savings+fin.cf,log:[...p.log,{text:`${t.passedPayday}: ${f(fin.cf)}`,color:C.green}]}));SFX.payday();setActionCard(null);endTurn();return;}
    if(sqType==="opp"){
      if(player.savings<card.cost)return;
      SFX.buy();updP(p=>({...p,savings:p.savings-card.cost,assets:[...p.assets,{...card,value:card.cost}],log:[...p.log,{text:`Comprou: ${card.title[lang]} (+${f(card.cashflow)}/mês)`,color:C.green}]}));
      if(card.cashflow>=400)setBoldCard(card);
      setActionCard(null);if(card.cashflow<400)endTurn();return;
    }
    if(sqType==="doodad"){
      SFX.doodad();updP(p=>({...p,savings:p.savings-card.cost,log:[...p.log,{text:`Doodad: ${card.title[lang]} (-${f(card.cost)})`,color:C.red}]}));setActionCard(null);endTurn();return;
    }
    if(sqType==="market"){
      SFX.buy();let gain=0;updP(p=>{let assets=[...p.assets];if(card.special==="refi"){const ex=[...p.expenses];if(ex[0])ex[0]={...ex[0],value:Math.max(0,ex[0].value-200)};return {...p,expenses:ex,log:[...p.log,{text:card.title[lang]+": despesas reduzidas",color:C.green}]};}
        const affected=assets.filter(a=>card.affects==="any"||a.type===card.affects);
        if(affected.length){const a=affected[0];gain=(a.potential||a.cost)*card.mult;assets=assets.filter(x=>x!==a);}
        return {...p,savings:p.savings+gain,assets,log:[...p.log,{text:`${card.title[lang]}: +${f(gain)}`,color:gain>0?C.green:C.t2}]};});
      setActionCard(null);endTurn();return;
    }
    if(sqType==="charity"){
      const donation=Math.max(0,Math.round(fin.cf*.1));updP(p=>({...p,savings:p.savings-donation,log:[...p.log,{text:`Caridade: -${f(donation)}`,color:C.purple}]}));setActionCard(null);endTurn();return;
    }
  };
  const handleSkip=()=>{if(!actionCard)return;SFX.skip();const {card,sqType}=actionCard;if(sqType==="opp"&&card.cashflow>0)setMissedCard(card);setActionCard(null);if(!(sqType==="opp"&&card.cashflow>0))endTurn();};
  const diceSum=dice[0]+dice[1], sq=player.onFastTrack?{t:FAST_SQUARES[player.outerPosition],i:"🏁"}:{t:RAT_SQUARES[player.position],i:SQLAB[lang][RAT_SQUARES[player.position]]};
  const sqCol=sq.t==="payday"||sq.t==="cash"?C.green:sq.t==="opp"||sq.t==="biz"?C.gold:sq.t==="market"?C.blue:sq.t==="doodad"||sq.t==="downsize"?C.red:C.purple;
  const btnDisabled=rolling||hasRolled||!!actionCard;
  const btnLabel=rolling?t.rolling:hasRolled?t.rolled:skipping>0?`${t.skip} (${skipping})`:t.roll;
  const btnBg=rolling?C.card2:hasRolled?C.card2:C.gold, btnFg=hasRolled?C.t3:C.black;

  return (
    <div style={{background:C.black,height:"100%",display:"flex",flexDirection:"column",fontFamily:"-apple-system,BlinkMacSystemFont,sans-serif",maxWidth:440,margin:"0 auto"}}>
      {/* NAV */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 18px 8px",borderBottom:"0.5px solid rgba(255,255,255,.06)"}}>
        <div>
          <div style={{fontSize:9,color:C.t3,textTransform:"uppercase",letterSpacing:1.5,marginBottom:1}}>{t.round} {round}{player.onFastTrack?" · 🏁 PISTA RÁPIDA":""}</div>
          <div style={{fontSize:15,fontWeight:700,color:player.onFastTrack?C.gold:C.t1}}>{player.profession}</div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{textAlign:"right"}}><div style={{fontSize:9,color:C.t3,textTransform:"uppercase",letterSpacing:1}}>{t.cashflow}</div><div style={{fontSize:14,fontWeight:700,color:fin.cf>=0?C.green:C.red,marginTop:1}}>{f(fin.cf)}</div></div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflow:"hidden",position:"relative"}}>
        {tab===0&&<BoardTab player={player} fin={fin} round={round} lang={lang} milestoneJust={milestoneJust} onMilestoneDismiss={()=>setMilestoneJust(null)}/>} 
        {tab===1&&<SheetTab player={player} fin={fin} lang={lang} t={t}/>} 
        {tab===2&&<LogTab log={player.log} t={t}/>} 
      </div>

      {/* CF STRIP */}
      <CFStrip fin={fin} lang={lang} t={t}/>

      {/* DICE */}
      <div style={{flexShrink:0,background:"#0D0D0D",padding:"10px 16px 8px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",gap:7,flexShrink:0}}><Die val={dice[0]} rolling={rolling}/><Die val={dice[1]} rolling={rolling}/></div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
            <button onClick={roll} disabled={btnDisabled} style={{width:"100%",padding:"12px",background:btnBg,border:"none",borderRadius:14,color:btnFg,fontSize:15,fontWeight:800,cursor:btnDisabled?"default":"pointer",fontFamily:"-apple-system,sans-serif",transition:"all .2s",boxShadow:!rolling&&!hasRolled&&!skipping?`0 4px 18px ${C.gold}44`:"none"}}>{btnLabel}</button>
            <div style={{display:"flex",gap:7}}>
              <div style={{flex:1,background:"rgba(255,255,255,.05)",borderRadius:10,padding:"6px 11px",display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:18,fontWeight:800,color:C.gold,lineHeight:1}}>{diceSum}</span>
                <span style={{fontSize:10,color:C.t3}}>→ {t.square} {player.onFastTrack?player.outerPosition||0:player.position}</span>
              </div>
              <div style={{background:sqCol+"18",border:`1px solid ${sqCol}33`,borderRadius:10,padding:"6px 9px",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                <span style={{fontSize:12}}>{sq.i}</span>
                <span style={{fontSize:10,fontWeight:700,color:sqCol}}>{SQLAB[lang][sq.t]}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* TAB BAR */}
      <div style={{flexShrink:0,background:"#0D0D0D",borderTop:"0.5px solid rgba(255,255,255,.06)",padding:"7px 0 26px",display:"flex"}}>
        {[[0,"🗺",t.board],[1,"📋",t.sheet],[2,"📜",t.log]].map(([i,icon,label])=>(
          <button key={i} onClick={()=>{SFX.tab();setTab(i);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"5px 0",fontFamily:"-apple-system,sans-serif"}}>
            <span style={{fontSize:19,opacity:tab===i?1:.35}}>{icon}</span>
            <span style={{fontSize:9,fontWeight:600,color:tab===i?C.gold:C.t3}}>{label}</span>
          </button>
        ))}
      </div>

      {/* OVERLAYS */}
      {actionCard&&<ActionModal card={actionCard.card} sqType={actionCard.sqType} player={player} lang={lang} fin={fin} onAction={handleAction} onSkip={handleSkip}/>} 
      {missedCard&&<MissedModal card={missedCard} lang={lang} onClose={()=>{setMissedCard(null);endTurn();}}/>} 
      {boldCard&&<BoldMoveModal card={boldCard} lang={lang} onClose={()=>{setBoldCard(null);endTurn();}}/>} 
      {showFastTrackModal&&<FastTrackModal lang={lang} onClose={()=>{setShowFastTrackModal(false);updP(p=>({...p,onFastTrack:true,outerPosition:0}));endTurn();}}/>} 
      {victor&&<VictoryScreen player={player} fin={fin} lang={lang} onRestart={onRestart}/>} 
    </div>
  );
}

/* ─── ROOT ────────────────────────────────────────────────── */
function App() {
  const [gs,setGs]=useState(null);
  const start=useCallback((prof,lang)=>{
    setGs({player:{
      profession:prof.name[lang],profKey:prof.key,color:prof.color,
      salary:prof.salary,savings:prof.savings,children:0,childCost:800,
      expenses:prof.expenses.map(e=>({desc:e.desc,value:e.value})),
      liabilities:prof.liabilities.map(l=>({...l})),
      assets:[],passiveIncomes:[],position:0,outerPosition:0,onFastTrack:false,
      log:[{text:`Jogo iniciado como ${prof.name[lang]}`,color:C.gold}],
    },lang});
  },[]);
  if(!gs)return <Onboarding onStart={start}/>;
  return <GameScreen key={gs.player.profKey+gs.lang} initPlayer={gs.player} lang={gs.lang} onRestart={()=>setGs(null)}/>;
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  setTimeout(() => { const b=document.getElementById('boot'); if(b) b.style.display='none'; }, 250);
} catch(e) {
  const el=document.getElementById('err');
  el.style.display='block';
  el.textContent='Erro ao iniciar o jogo:\n'+(e && e.stack ? e.stack : e);
}
</script>
</body>
</html>
