<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Cashflow Teste</title><style>:root{--g:#C9A84C;--bg:#080C0A;--c:#141C16;--c2:#1C2820;--b:#253020;--t:#ECF0EC;--m:#78907e;--ok:#2ECC71;--bad:#E74C3C}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#123015,#080C0A 55%,#030504);color:var(--t);font-family:Inter,system-ui,-apple-system,Arial,sans-serif}button,input,select{font:inherit}.hide{display:none!important}.wrap{max-width:1180px;margin:auto;padding:16px}.hero{text-align:center;padding:24px 8px}.logo{width:62px;height:62px;margin:0 auto 14px;border-radius:18px;background:linear-gradient(135deg,#8B6914,var(--g));display:grid;place-items:center;color:#111;font-weight:950;font-size:26px}h1{font-size:clamp(34px,8vw,68px);line-height:.9;margin:0}.gold{color:var(--g)}.mut{color:var(--m)}.grid{display:grid;gap:12px}.g4{grid-template-columns:repeat(4,1fr)}.g2{grid-template-columns:1.15fr .85fr}.card{background:rgba(20,28,22,.9);border:1px solid var(--b);border-radius:22px;padding:16px;box-shadow:0 18px 45px #0006}.slot{display:flex;gap:13px;align-items:center;background:var(--c);border:1px solid var(--b);border-radius:18px;padding:16px;cursor:pointer;min-height:90px}.slot.taken{border-color:#8B6914}.av{width:48px;height:48px;border-radius:14px;background:var(--c2);display:grid;place-items:center;font-weight:900;color:var(--m)}.taken .av{background:linear-gradient(135deg,#8B6914,var(--g));color:#111}.slot small{display:block;color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:1.3px}.slot b{font-size:16px}.row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:15px;background:var(--g);color:#111;font-weight:900;padding:13px 16px;min-height:46px;cursor:pointer}.dark{background:var(--c2);color:var(--t);border:1px solid var(--b)}.red{background:#e74c3c22;color:#ffbeb8;border:1px solid #e74c3c55}.field{display:grid;gap:7px;margin:12px 0}.field label{color:var(--m);font-size:10px;text-transform:uppercase;letter-spacing:1.2px}.inp{width:100%;padding:13px;border-radius:13px;border:1px solid var(--b);background:var(--c2);color:var(--t)}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}.stat{background:#ffffff0b;border:1px solid #ffffff12;border-radius:16px;padding:12px}.stat span{display:block;color:var(--m);font-size:11px}.stat b{display:block;font-size:clamp(18px,3vw,26px);margin-top:4px}.ok{color:var(--ok)}.bad{color:var(--bad)}.board{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.cell{min-height:86px;border-radius:16px;padding:10px;background:linear-gradient(145deg,#ffffff10,#ffffff05);border:1px solid #ffffff12;position:relative}.cell.on{outline:3px solid var(--g);box-shadow:0 0 0 6px #c9a84c22}.n{font-size:10px;color:var(--m);font-weight:800}.e{font-weight:900;margin-top:7px;font-size:13px}.tok{position:absolute;right:8px;bottom:8px;width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--g);color:#111;font-weight:950}.prog{height:10px;background:#ffffff14;border-radius:99px;overflow:hidden}.prog i{display:block;height:100%;background:linear-gradient(90deg,#8B6914,var(--g));width:0}.dice{font-size:58px;font-weight:950;text-align:center;background:#c9a84c1c;border:1px solid #c9a84c44;border-radius:22px;padding:14px;color:var(--g)}.tabs{display:flex;gap:6px;padding:5px;background:#ffffff0b;border-radius:16px;margin:12px 0;overflow:auto}.tab{background:transparent;color:var(--m);border:0;padding:10px;border-radius:12px;font-weight:800}.tab.on{background:#c9a84c22;color:var(--g)}.item,.log div{padding:10px 11px;border-radius:13px;background:#ffffff0b;border:1px solid #ffffff10;font-size:13px}.item{display:flex;justify-content:space-between;gap:8px}.list,.log{display:grid;gap:8px;margin-top:10px}.log{max-height:270px;overflow:auto}.modal{position:fixed;inset:0;background:#000b;display:grid;place-items:center;padding:18px;z-index:10}.box{width:min(430px,100%);background:var(--c);border:1px solid var(--b);border-radius:22px;padding:18px}.win{display:none;margin-top:12px;padding:13px;border-radius:16px;background:#2ecc7122;border:1px solid #2ecc7155;font-weight:900;color:#c8ffdc}.bank{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.mini{border-left:4px solid var(--g)}@media(max-width:900px){.g4,.g2,.bank{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:repeat(3,1fr)}.top{align-items:flex-start;flex-direction:column}}</style></head><body><section id="lobby"><div class="wrap"><div class="hero"><div class="logo">CF</div><h1>CASHFLOW<br><span class="gold">TESTE</span></h1><p class="mut">Versão melhorada com base no arquivo enviado: lobby, ficha, tabuleiro e banqueiro.</p></div><div id="slots" class="grid g4"></div><div class="row" style="justify-content:center;margin-top:16px"><button class="btn" onclick="openBank()">🏦 Entrar como Banqueiro</button><button class="btn dark" onclick="resetAll()">↻ Resetar tudo</button></div></div></section><section id="entry" class="hide"><div class="wrap" style="max-width:430px;padding-top:8vh"><div class="card"><div class="gold" id="entrySlot">Jogador</div><h2>Bem-vindo!</h2><p class="mut">Crie sua ficha para começar.</p><div class="field"><label>Seu nome</label><input id="name" class="inp" placeholder="Ex: Maurício"></div><div class="field"><label>Profissão</label><select id="prof" class="inp"></select></div><div class="row"><button class="btn" onclick="savePlayer()">Entrar</button><button class="btn dark" onclick="show('lobby')">Voltar</button></div></div></div></section><section id="game" class="hide"><div class="wrap"><div class="top"><div><h2 id="pt"></h2><p class="mut" id="ps"></p></div><div class="row"><button class="btn dark" onclick="show('lobby')">← Lobby</button><button class="btn red" onclick="resetPlayer(active)">Resetar ficha</button></div></div><div class="grid g2"><main class="card"><div class="stats"><div class="stat"><span>Dinheiro</span><b id="cash" class="ok"></b></div><div class="stat"><span>Renda passiva</span><b id="passive" class="gold"></b></div><div class="stat"><span>Despesas</span><b id="expenses" class="bad"></b></div><div class="stat"><span>Fluxo</span><b id="flow"></b></div></div><div class="field"><label>Liberdade financeira</label><div class="prog"><i id="freedom"></i></div><p class="mut" id="ft" style="font-size:12px"></p></div><div id="board" class="board"></div><div class="row" style="margin-top:14px"><button class="btn" onclick="roll()">🎲 Rolar dado</button><button class="btn dark" onclick="monthClose()">📆 Fechar mês</button><button class="btn dark" onclick="openAdd('asset')">+ Ativo</button><button class="btn dark" onclick="openAdd('expense')">+ Despesa</button></div><div id="win" class="win">🏆 Vitória! Sua renda passiva cobre suas despesas.</div></main><aside class="card"><div class="dice" id="dice">–</div><div class="tabs"><button class="tab on" onclick="tab='ativos';renderGame()">Ativos</button><button class="tab" onclick="tab='passivos';renderGame()">Passivos</button><button class="tab" onclick="tab='log';renderGame()">Histórico</button></div><div id="panel"></div></aside></div></div></section><section id="banker" class="hide"><div class="wrap"><div class="top"><div><h2>Painel do Banqueiro</h2><p class="mut">Visão geral dos jogadores.</p></div><button class="btn dark" onclick="show('lobby')">← Lobby</button></div><div id="bankerGrid" class="bank"></div></div></section><div id="modal" class="modal hide"><div class="box"><h2 id="mt"></h2><div class="field"><label>Descrição</label><input id="md" class="inp"></div><div class="field"><label id="ml">Valor mensal</label><input id="mv" class="inp" type="number"></div><div class="row"><button class="btn" onclick="confirmAdd()">Adicionar</button><button class="btn dark" onclick="modal.classList.add('hide')">Cancelar</button></div></div></div><script>const PROF={Médico:[13200,4000,35000],Engenheiro:[9200,3100,25000],Piloto:[10800,3800,32000],Advogado:[8400,2900,22000],Gerente:[6500,2600,18000],Professor:[3900,1900,8000],Motorista:[3200,1600,9000],Enfermeiro:[4600,2100,12000],Vendedor:[4200,1800,7000],Empreendedor:[5500,2500,15000]},cells=[['Salário','Receba sua renda ativa'],['Despesa','Imprevisto familiar'],['Mercado','Oportunidade pequena'],['Caridade','Doe e ganhe networking'],['Despesa','Manutenção do carro'],['Negócio','Máquina de vendas'],['Mercado','Produto em promoção'],['Salário','Cliente pagou'],['Despesa','Conta atrasada'],['Ativo','Aluguel digital'],['Mercado','Compra de estoque'],['Fechamento','Fim do mês']];let state,active=1,pending=1,tab='ativos',addType='asset';function fresh(){let p={};for(let i=1;i<=4;i++)p[i]={slot:i,name:'',profession:'',pos:0,dice:'–',cash:0,salary:0,passive:0,expenses:0,debt:0,assets:[],liabilities:[],log:[]};return{players:p}}function save(){localStorage.setItem('cf-v2',JSON.stringify(state))}function load(){try{state=JSON.parse(localStorage.getItem('cf-v2'))}catch(e){}if(!state)state=fresh();renderLobby()}function money(n){return Number(n||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0})}function show(id){['lobby','entry','game','banker'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide');if(id==='lobby')renderLobby();if(id==='game')renderGame();if(id==='banker')renderBank()}function flow(p){return(p.salary||0)+(p.passive||0)-(p.expenses||0)}function renderLobby(){slots.innerHTML='';for(let i=1;i<=4;i++){let p=state.players[i];slots.innerHTML+=`<div class="slot ${p.name?'taken':''}" onclick="selectSlot(${i})"><div class="av">${p.name?p.name[0].toUpperCase():i}</div><div><small>Jogador ${i}</small><b>${p.name||'Vaga disponível'}</b><div class="mut" style="font-size:13px">${p.name?money(flow(p))+' / mês':'toque para entrar'}</div></div></div>`}}function selectSlot(i){pending=i;entrySlot.textContent='Jogador '+i;name.value=state.players[i].name||'';prof.innerHTML=Object.keys(PROF).map(x=>`<option ${state.players[i].profession===x?'selected':''}>${x}</option>`).join('');show('entry')}function savePlayer(){let nm=name.value.trim()||'Jogador '+pending,pr=prof.value,b=PROF[pr],old=state.players[pending];state.players[pending]={...old,name:nm,profession:pr,cash:old.cash||b[2],salary:old.salary||b[0],expenses:old.expenses||b[1],debt:old.debt||b[2]*1.5,log:old.log.length?old.log:[`Ficha criada: ${pr}.`]};active=pending;save();show('game')}function P(){return state.players[active]}function icon(t){return{Salário:'💰',Despesa:'⚠️',Mercado:'📈',Caridade:'🤝',Negócio:'🏪',Ativo:'🏠',Fechamento:'📆'}[t]||'🎯'}function addLog(x){P().log.push(x);save();renderGame()}function renderGame(){let p=P(),pct=Math.min(100,Math.round((p.passive/(p.expenses||1))*100));pt.textContent=p.name||'Jogador';ps.textContent=(p.profession||'Sem profissão')+' · ficha digital + tabuleiro';cash.textContent=money(p.cash);passive.textContent=money(p.passive);expenses.textContent=money(p.expenses);flow.textContent=money(flow(p));flow.className=flow(p)>=0?'ok':'bad';freedom.style.width=pct+'%';ft.textContent=`${money(p.passive)} de renda passiva / meta ${money(p.expenses)} (${pct}%)`;dice.textContent=p.dice;board.innerHTML=cells.map((c,i)=>`<div class="cell ${i===p.pos?'on':''}"><div class="n">CASA ${i+1}</div><div class="e">${icon(c[0])} ${c[0]}</div><div class="mut" style="font-size:12px;margin-top:5px">${c[1]}</div>${i===p.pos?'<div class="tok">'+(p.name?p.name[0].toUpperCase():'J')+'</div>':''}</div>`).join('');document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['ativos','passivos','log'][i]===tab));if(tab==='ativos')panel.innerHTML='<h3>Ativos</h3><div class="list">'+(p.assets.length?p.assets.map(a=>`<div class="item"><span>${a.name}</span><b class="ok">+${money(a.value)}/mês</b></div>`).join(''):'<div class="mut">Nenhum ativo ainda.</div>')+'</div>';if(tab==='passivos')panel.innerHTML='<h3>Passivos</h3><div class="list">'+(p.liabilities.length?p.liabilities.map(a=>`<div class="item"><span>${a.name}</span><b class="bad">-${money(a.value)}/mês</b></div>`).join(''):`<div class="item"><span>Dívida inicial</span><b>${money(p.debt)}</b></div>`)+ '</div>';if(tab==='log')panel.innerHTML='<h3>Histórico</h3><div class="log">'+p.log.slice(-18).reverse().map(x=>`<div>${x}</div>`).join('')+'</div>';win.style.display=p.passive>=p.expenses?'block':'none';save()}function roll(){let p=P(),d=Math.ceil(Math.random()*6);p.dice=d;p.pos=(p.pos+d)%cells.length;eventCell(cells[p.pos][0]);renderGame()}function eventCell(t){let p=P();if(t==='Salário'){p.cash+=p.salary;addLog('💰 Salário recebido: '+money(p.salary))}else if(t==='Despesa'){let v=[350,650,950,1400][Math.floor(Math.random()*4)];p.cash-=v;p.expenses+=50;addLog('⚠️ Despesa inesperada: -'+money(v)+' e +R$50/mês em despesas.')}else if(t==='Caridade'){p.cash-=200;p.passive+=50;p.assets.push({name:'Networking / indicação',value:50});addLog('🤝 Caridade: -R$200 agora, +R$50/mês renda passiva.')}else if(['Mercado','Negócio','Ativo'].includes(t))offer();else monthClose()}function offer(){let p=P(),ops=[['Micro loja online',1200,180],['Estoque de moda',1800,260],['Máquina de venda',2500,340],['Quarto para aluguel',3200,420],['Página de afiliados',900,120],['Cota de imóvel',5000,650]],a=ops[Math.floor(Math.random()*ops.length)];if(p.cash>=a[1]){p.cash-=a[1];p.passive+=a[2];p.assets.push({name:a[0],value:a[2]});addLog('📈 Comprou '+a[0]+' por '+money(a[1])+'. Renda passiva +'+money(a[2])+'/mês.')}else addLog('📈 Oportunidade: '+a[0]+' custava '+money(a[1])+', mas faltou caixa.')}function monthClose(){let p=P();p.cash+=p.passive;p.cash-=p.expenses;let a=Math.min(500,p.debt);p.debt-=a;p.cash-=a;addLog('📆 Fechamento: renda passiva '+money(p.passive)+', despesas '+money(p.expenses)+', dívida amortizada '+money(a)+'.')}function openAdd(t){addType=t;mt.textContent=t==='asset'?'+ Ativo':'+ Despesa';ml.textContent=t==='asset'?'Renda mensal (R$)':'Despesa mensal (R$)';md.value='';mv.value='';modal.classList.remove('hide')}function confirmAdd(){let p=P(),d=md.value.trim()||(addType==='asset'?'Ativo manual':'Despesa manual'),v=Number(mv.value||0);if(!v)return;if(addType==='asset'){p.passive+=v;p.assets.push({name:d,value:v});p.log.push('➕ Ativo manual: '+d+' +'+money(v)+'/mês.')}else{p.expenses+=v;p.liabilities.push({name:d,value:v});p.log.push('➕ Despesa manual: '+d+' -'+money(v)+'/mês.')}modal.classList.add('hide');renderGame()}function resetPlayer(i){if(!confirm('Resetar esta ficha?'))return;state.players[i]=fresh().players[i];save();show('lobby')}function resetAll(){if(!confirm('Resetar todos os jogadores?'))return;state=fresh();save();renderLobby()}function openBank(){show('banker')}function renderBank(){bankerGrid.innerHTML='';for(let i=1;i<=4;i++){let p=state.players[i],pct=Math.min(100,Math.round((p.passive/(p.expenses||1))*100));bankerGrid.innerHTML+=`<div class="card mini"><div class="row" style="justify-content:space-between"><h3>${p.name||'Jogador '+i}</h3><button class="btn dark" onclick="active=${i};show('game')">Abrir</button></div><p class="mut">${p.profession||'vaga disponível'}</p><div class="stats" style="grid-template-columns:repeat(2,1fr);margin-top:10px"><div class="stat"><span>Caixa</span><b>${money(p.cash)}</b></div><div class="stat"><span>Fluxo</span><b class="${flow(p)>=0?'ok':'bad'}">${money(flow(p))}</b></div><div class="stat"><span>Passiva</span><b class="gold">${money(p.passive)}</b></div><div class="stat"><span>Despesas</span><b class="bad">${money(p.expenses)}</b></div></div><div class="prog"><i style="width:${pct}%"></i></div><p class="mut" style="font-size:12px;margin-top:7px">Liberdade: ${pct}%</p></div>`}}load();</script></body></html>
