<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MRC OS v13</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:#04040A;color:#E8E6F0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* ── TOKENS ── */
:root{
  --a:#7C3AED;--ar:124,58,237;
  --bg:#04040A;--surf:#080810;--card:#0D0D1A;--card2:#121225;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.09);
  --t1:#E8E6F0;--t2:rgba(232,230,240,.55);--t3:rgba(232,230,240,.25);
  --r:12px;--rs:8px;
}

/* ── KEYFRAMES ── */
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(var(--ar),.3)}50%{box-shadow:0 0 22px rgba(var(--ar),.65)}}
@keyframes scan{from{top:-2px}to{top:100%}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@keyframes ringFill{from{stroke-dashoffset:251}to{stroke-dashoffset:var(--target-offset)}}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes chatIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes typingDot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes goalPulse{0%,100%{box-shadow:0 0 0 0 rgba(22,168,84,.4)}50%{box-shadow:0 0 0 8px rgba(22,168,84,0)}}

.fade{animation:fadeUp .22s ease both}
.blink{animation:pulse 1.4s ease-in-out infinite}
.glow-a{animation:glow 2.5s ease-in-out infinite}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;background:var(--bg)}

/* ── TOPBAR ── */
#top{
  height:52px;display:flex;align-items:center;
  background:var(--surf);border-bottom:1px solid var(--b);
  flex-shrink:0;position:relative;z-index:50;
  transition:border-color .35s,background .35s;
}
.t-brand{
  width:220px;min-width:220px;display:flex;align-items:center;gap:10px;
  padding:0 16px;border-right:1px solid var(--b);height:100%;flex-shrink:0;
  transition:width .25s,min-width .25s;cursor:pointer;
}
.t-brand.col{width:56px;min-width:56px}
.t-mark{
  width:30px;height:30px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;
  background:linear-gradient(135deg,var(--a),rgba(var(--ar),.4));
  box-shadow:0 2px 10px rgba(var(--ar),.5);position:relative;overflow:hidden;
}
.t-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent)}
.t-info{overflow:hidden}
.t-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--t1);white-space:nowrap;letter-spacing:.02em}
.t-ver{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.t-ctx{
  display:flex;align-items:center;gap:9px;padding:0 18px;
  border-right:1px solid var(--b);height:100%;flex-shrink:0;
}
.ctx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .35s,box-shadow .35s;animation:dotPulse 2s ease-in-out infinite}
.ctx-lbl{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;transition:color .35s;text-transform:uppercase}
.t-mid{flex:1;display:flex;align-items:center;padding:0 18px;gap:12px}
.t-focus{
  flex:1;max-width:360px;background:rgba(255,255,255,.03);
  border:1px solid var(--b);border-radius:7px;
  color:var(--t1);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;
  padding:5px 12px;outline:none;transition:border-color .15s,background .15s;
}
.t-focus:focus{border-color:rgba(var(--ar),.4);background:rgba(255,255,255,.05)}
.t-focus::placeholder{color:var(--t3)}
.t-alert-btn{
  display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  color:#EF4444;font-size:11px;font-weight:700;cursor:pointer;
  white-space:nowrap;font-family:'Inter',sans-serif;
}
.t-kpi-pill{
  display:flex;align-items:center;gap:6px;padding:4px 11px;border-radius:20px;
  background:rgba(22,168,84,.07);border:1px solid rgba(22,168,84,.18);
  color:#16A854;font-size:11px;font-weight:700;white-space:nowrap;
  font-family:'JetBrains Mono',monospace;
}
.t-timer-pill{
  display:flex;align-items:center;gap:7px;padding:4px 11px;border-radius:20px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
}
.t-right{display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0}
.t-xp{
  background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.18);
  border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;
  color:#A855F7;font-family:'JetBrains Mono',monospace;white-space:nowrap;
}
.t-clock{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:5px 12px}
.t-hm{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;line-height:1;color:var(--t1)}
.t-sec{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3)}
.t-date{font-size:9px;color:var(--t3);text-transform:capitalize;margin-top:1px}
/* Hamburguer (mobile) */
.t-burger{
  display:none;align-items:center;justify-content:center;
  width:40px;height:40px;background:none;border:none;
  color:var(--t2);font-size:20px;cursor:pointer;flex-shrink:0;margin-left:4px;
}

/* ── BODY ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#side{
  width:220px;min-width:220px;
  display:flex;flex-direction:column;
  border-right:1px solid var(--b);background:var(--surf);
  transition:width .25s,min-width .25s;flex-shrink:0;overflow:hidden;
}
#side.col{width:52px;min-width:52px}
.nav-sc{flex:1;overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:1px}
.ns{
  font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--t3);padding:12px 8px 4px;white-space:nowrap;overflow:hidden;
  font-family:'Syne',sans-serif;
}
.ni{
  display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;color:var(--t3);
  width:100%;text-align:left;transition:background .12s,color .12s;
  white-space:nowrap;overflow:hidden;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
  min-height:44px;
}
.ni:hover{background:rgba(255,255,255,.04);color:var(--t2)}
.ni.on{background:rgba(var(--ar),.1);color:var(--a)}
.ni-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.ni-lbl{flex:1;font-size:12px}
.ni-badge{
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;flex-shrink:0;
}
.ni-badge.green{background:rgba(22,168,84,.15);color:#16A854}
.ni-badge.yellow{background:rgba(232,168,32,.15);color:#E8A820}
.ni-badge.red{background:rgba(239,68,68,.15);color:#EF4444}
.ni-badge.gray{background:rgba(255,255,255,.07);color:var(--t2)}
.ni-dot{width:5px;height:5px;border-radius:50%;background:#EF4444;flex-shrink:0;box-shadow:0 0 5px #EF4444}
.s-foot{padding:8px 6px;border-top:1px solid var(--b);flex-shrink:0}
.s-xp-wrap{padding:8px 7px 10px;overflow:hidden}
.s-xp-ring{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.s-lvl{font-size:9px;font-weight:700;color:var(--a);font-family:'Syne',sans-serif;letter-spacing:.05em;white-space:nowrap}
.col-btn{
  display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;color:var(--t3);
  width:100%;font-family:'Inter',sans-serif;font-size:12px;min-height:44px;
}
.col-btn:hover{background:rgba(255,255,255,.04);color:var(--t2)}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden}
.pw{padding:24px 28px;max-width:1400px;margin:0 auto;animation:fadeUp .22s ease both}
.pg-h{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--t1);letter-spacing:-.01em}
.pg-sub{font-size:13px;color:var(--t2);margin-top:5px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:16px}
.card2{background:var(--card2);border:1px solid var(--b2);border-radius:var(--r);padding:16px}
.card-xs{background:var(--card);border:1px solid var(--b);border-radius:var(--rs);padding:12px}
.card-s{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px}
.card-hl{background:#181835;border:1px solid rgba(var(--ar),.18);border-radius:var(--r);padding:16px}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}

/* ── TEXT ── */
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:'Syne',sans-serif}
.sec-lbl-a{color:var(--a)}
.mono{font-family:'JetBrains Mono',monospace}
.dim{font-size:12px;color:var(--t2)}
.dimx{font-size:11px;color:var(--t3)}

/* ── BARS ── */
.bar{background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.bar-f{height:100%;border-radius:99px;transition:width .6s ease}
.bar-sm{height:3px}
.bar-md{height:4px}
.bar-lg{height:6px}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;
  border:none;cursor:pointer;font-family:'Inter',sans-serif;
  transition:opacity .15s,transform .1s;min-height:44px;
}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-a{background:var(--a);color:#fff}
.btn-g{background:rgba(255,255,255,.07);border:1px solid var(--b);color:var(--t2)}
.btn-sm{padding:5px 10px;font-size:11px;min-height:36px}
.btn-xs{padding:3px 8px;font-size:10px;min-height:28px}

/* ── HERO ACTION ── */
.hero-action{background:var(--card);border:1px solid rgba(var(--ar),.2);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.hero-action::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ar),.4),transparent)}
.hero-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--t1);margin-bottom:4px}
.hero-desc{font-size:12px;color:var(--t2);margin-bottom:14px}

/* ── BIZ CARDS ── */
.biz-card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .15s,transform .12s;position:relative;overflow:hidden;border-top:2px solid var(--bc,var(--a))}
.biz-card:hover{border-color:rgba(var(--ar),.25);transform:translateY(-2px)}
.biz-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.biz-blocker{font-size:10px;color:#EF4444;margin-top:6px;line-height:1.4}
.biz-pot{font-size:11px;color:#16A854;font-family:'JetBrains Mono',monospace;font-weight:700;margin-top:4px}

/* ── CLIENT CARDS ── */
.cli-card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .15s,transform .12s;overflow:hidden}
.cli-card:hover{border-color:rgba(var(--ar),.2);transform:translateY(-2px)}
.cli-name{font-size:14px;font-weight:700;color:var(--t1)}
.cli-val{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--t1)}

/* ── STATS ── */
.stat{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px;text-align:center}
.stat-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-top:5px;font-family:'Syne',sans-serif}
.stat-s{font-size:11px;color:var(--t2);margin-top:3px}

/* ── PIPELINE ── */
.pipe-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pipe-col{}
.pipe-hd{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.pipe-body{display:flex;flex-direction:column;gap:7px}
.pipe-item{background:var(--card2);border:1px solid var(--b);border-left:3px solid transparent;border-radius:var(--rs);padding:10px 12px;cursor:pointer;transition:opacity .15s}
.pipe-item:hover{opacity:.8}
.pi-done{opacity:.45;cursor:default}
.pi-lock{opacity:.35;cursor:not-allowed}
.pi-ico{font-size:13px;margin-bottom:4px}
.pi-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.3}
.pi-impact{font-size:10px;margin-top:4px}
.pi-money{display:inline-block;font-size:10px;font-weight:700;color:#16A854;background:rgba(22,168,84,.1);border-radius:4px;padding:2px 6px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.pi-req{font-size:10px;color:var(--t3);margin-top:4px;font-style:italic}

/* ── DIGITAL ── */
.dig-row{display:flex;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--b)}
.dig-row:last-child{border-bottom:none}
.dig-plat{font-size:11px;font-weight:700;color:var(--t2);min-width:120px;flex-shrink:0}

/* ── FIN ── */
.fin-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--b)}
.fin-row:last-child{border-bottom:none}
.fin-lbl{font-size:12px;color:var(--t2);flex:1}
.fin-inp{
  background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:6px;
  color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
  padding:4px 10px;width:120px;text-align:right;outline:none;
}
.fin-inp:focus{border-color:rgba(var(--ar),.4)}
.fin-total{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:#16A854}

/* ── AI PANEL ── */
.ai-panel{background:rgba(255,255,255,.02);border:1px solid rgba(var(--ar),.12);border-radius:var(--r);padding:16px}
.ai-panel-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ai-panel-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--t1)}
.ai-regen{background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:6px;color:var(--t2);font-size:11px;padding:4px 10px;cursor:pointer;font-family:'Inter',sans-serif;min-height:32px}
.ai-regen:hover{background:rgba(255,255,255,.09);color:var(--t1)}
.ai-content{font-size:13px;color:var(--t2);line-height:1.65}
.ai-content h3{font-size:13px;font-weight:700;color:var(--t1);margin:12px 0 6px}
.ai-content strong{color:var(--t1);font-weight:600}
.ai-content ul{padding-left:18px;margin:8px 0}
.ai-content li{margin-bottom:4px}

/* ── SKELETON ── */
.skel{background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden;position:relative}
.skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.5s ease-in-out infinite}
.skel-line{height:12px;margin-bottom:8px}
.w85{width:85%}.w70{width:70%}.w50{width:50%}.w95{width:95%}

/* ── XP RING SVG ── */
.xp-ring-svg{transform:rotate(-90deg)}
.xp-ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:3}
.xp-ring-fill{fill:none;stroke:var(--a);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s ease;animation:ringFill .8s ease both}

/* ── STATUS RING ── */
.st-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.st-ring svg{transform:rotate(-90deg)}

/* ── CHAT WIDGET ── */
#chat-btn{
  position:fixed;bottom:24px;right:20px;
  width:48px;height:48px;border-radius:50%;
  background:var(--a);border:none;cursor:pointer;
  font-size:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(var(--ar),.5);z-index:300;
  transition:transform .2s,box-shadow .2s;
}
#chat-btn:hover{transform:scale(1.08);box-shadow:0 6px 26px rgba(var(--ar),.65)}
#chat-win{
  position:fixed;bottom:82px;right:20px;
  width:340px;height:480px;
  background:var(--surf);border:1px solid rgba(var(--ar),.2);border-radius:18px;
  display:none;flex-direction:column;z-index:300;
  box-shadow:0 20px 60px rgba(0,0,0,.6);animation:chatIn .2s ease both;overflow:hidden;
}
#chat-win.open{display:flex}
.chat-hd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--b);flex-shrink:0}
.chat-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--a),#4C1D95);display:flex;align-items:center;justify-content:center;font-size:14px}
.chat-name{font-size:13px;font-weight:700;color:var(--t1)}
.chat-status{font-size:10px;color:#16A854}
.chat-close{margin-left:auto;background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;min-height:32px;min-width:32px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-bubble{padding:10px 13px;border-radius:12px;font-size:12px;line-height:1.55;max-width:88%}
.chat-bubble.user{background:rgba(var(--ar),.15);border:1px solid rgba(var(--ar),.2);color:var(--t1);align-self:flex-end;border-bottom-right-radius:3px}
.chat-bubble.ai{background:rgba(255,255,255,.04);border:1px solid var(--b);color:var(--t2);align-self:flex-start;border-bottom-left-radius:3px}
.chat-bubble h3{font-size:12px;font-weight:700;color:var(--t1);margin:8px 0 4px}
.chat-bubble strong{color:var(--t1)}
.chat-bubble ul{padding-left:14px;margin:6px 0}
.chat-bubble li{margin-bottom:3px}
.chat-typing-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--t3);margin:0 2px;animation:typingDot 1.2s ease-in-out infinite}
.chat-typing-dot:nth-child(2){animation-delay:.15s}
.chat-typing-dot:nth-child(3){animation-delay:.3s}
.chat-inp-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--b);flex-shrink:0}
.chat-inp{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:8px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;padding:8px 12px;outline:none;resize:none;min-height:36px}
.chat-inp:focus{border-color:rgba(var(--ar),.4)}
.chat-send{background:var(--a);border:none;color:#fff;border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:14px;flex-shrink:0}

/* ── DELIVERY TABLE ── */
.del-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--b);cursor:pointer;min-height:44px}
.del-row:last-child{border-bottom:none}
.del-chk{width:18px;height:18px;border-radius:5px;border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,border-color .15s}
.del-chk.done{background:#16A854;border-color:#16A854}
.del-t{font-size:12px;color:var(--t1);flex:1;line-height:1.4}
.del-freq{font-size:10px;color:var(--t3);white-space:nowrap}
.del-due{font-size:10px;font-weight:700;background:rgba(232,168,32,.1);color:#E8A820;border-radius:4px;padding:2px 6px;white-space:nowrap}
.del-due.ok{background:rgba(22,168,84,.1);color:#16A854}

/* ── EXTRAS ── */
.sat-bar{height:4px;border-radius:99px;overflow:hidden;background:rgba(255,255,255,.06);margin-top:6px}
.sat-bar-f{height:100%;border-radius:99px}

/* ── SATBAR ── */
.sat-slider{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:rgba(255,255,255,.1);outline:none;width:100%;cursor:pointer;accent-color:var(--a)}

/* ── PAGES SPECIAL ── */
.amazonia-hero{background:linear-gradient(135deg,rgba(22,168,84,.08),rgba(16,185,129,.04));border:1px solid rgba(22,168,84,.15);border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.amazonia-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(22,168,84,.06),transparent 70%)}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(22,22,40,.95);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;color:var(--t1);z-index:999;transition:opacity .3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(10px)}

/* ── TIMER PAGE ── */
.timer-display{font-family:'JetBrains Mono',monospace;font-size:64px;font-weight:700;color:var(--t1);letter-spacing:.02em;text-align:center}

/* ── BRIEFING CARD ── */
.brief-card{background:rgba(var(--ar),.04);border:1px solid rgba(var(--ar),.12);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.brief-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ar),.3),transparent)}

/* ── MISC ── */
.tag{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace}
.tag-green{background:rgba(22,168,84,.12);color:#16A854}
.tag-yellow{background:rgba(232,168,32,.12);color:#E8A820}
.tag-red{background:rgba(239,68,68,.12);color:#EF4444}
.tag-blue{background:rgba(59,130,246,.12);color:#3B82F6}
.tag-purple{background:rgba(168,85,247,.12);color:#A855F7}

/* ══════════════════════════════════
   ── TAB BAR (NOVO v13) ──
══════════════════════════════════ */
.tab-bar{
  display:flex;gap:4px;
  background:var(--card);border-radius:10px;
  padding:4px;margin-bottom:20px;overflow-x:auto;
}
.tab-item{
  flex:1;padding:8px 12px;border-radius:7px;
  border:none;background:transparent;
  color:var(--t3);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
  min-height:44px;white-space:nowrap;font-family:'Inter',sans-serif;
}
.tab-item.on{background:rgba(var(--ar),.15);color:var(--a)}

/* ── BOOTCAMP TRACK (NOVO v13) ── */
.track-step{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 0;border-bottom:1px solid var(--b);
  position:relative;
}
.track-step:last-child::before{display:none}
.track-step::before{
  content:"";position:absolute;
  left:18px;top:48px;bottom:-14px;
  width:2px;background:var(--b);
}
.step-ico{width:36px;height:36px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:16px;
  flex-shrink:0;position:relative;z-index:1;}
.step-locked{background:rgba(255,255,255,.05);opacity:.4}
.step-active{background:rgba(var(--ar),.15);border:2px solid var(--a)}
.step-done{background:rgba(22,168,84,.15);border:2px solid #16A854}
.step-body{flex:1;min-width:0}
.step-title{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.step-meta{font-size:11px;color:var(--t3)}
.step-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}

/* ── INTEGRATION CARD (NOVO v13) ── */
.integ-card{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);padding:14px;
}
.integ-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s}
.integ-active .integ-status-dot{background:#16A854;box-shadow:0 0 8px #16A854}
.integ-pending .integ-status-dot{background:#E8A820}
.integ-inactive .integ-status-dot{background:rgba(255,255,255,.2)}
.integ-info{flex:1;min-width:0}
.integ-name{font-size:13px;font-weight:700;color:var(--t1)}
.integ-note{font-size:11px;color:var(--t3);margin-top:2px}
.integ-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* ── AGENDA DAY BLOCK (NOVO v13) ── */
.agenda-day{background:var(--card);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.agenda-day.today{border-color:rgba(var(--ar),.35);box-shadow:0 0 20px rgba(var(--ar),.08)}
.agenda-day-hd{padding:10px 14px;border-bottom:1px solid var(--b);
  display:flex;align-items:center;justify-content:space-between;}
.agenda-day-name{font-size:11px;font-weight:700;color:var(--t1);font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:.05em}
.agenda-day-date{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.agenda-blocks{display:flex;flex-direction:column}
.agenda-block{display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;min-height:44px;border-bottom:1px solid var(--b);
  transition:background .12s;}
.agenda-block:last-child{border-bottom:none}
.agenda-block:hover{background:rgba(255,255,255,.02)}
.agenda-block.done-blk{opacity:.45}
.agenda-block-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:24px}
.agenda-block-time{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--t3);flex-shrink:0;width:36px}
.agenda-block-ico{font-size:14px;flex-shrink:0}
.agenda-block-label{flex:1;font-size:12px;font-weight:600;color:var(--t1);line-height:1.3}
.agenda-block-dur{font-size:10px;color:var(--t3);flex-shrink:0}
.agenda-empty{padding:12px 14px;font-size:11px;color:var(--t3);font-style:italic}
.agenda-add-btn{display:flex;align-items:center;justify-content:center;padding:8px 14px;border:none;background:transparent;color:var(--t3);font-size:11px;cursor:pointer;width:100%;min-height:36px;border-top:1px dashed var(--b);font-family:'Inter',sans-serif}
.agenda-add-btn:hover{color:var(--a);background:rgba(var(--ar),.04)}

/* ── GOAL BAR (NOVO v13) ── */
.goal-bar-wrap{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:14px;margin-bottom:16px}
.goal-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.goal-bar-label{font-size:11px;font-weight:700;color:var(--t2)}
.goal-bar-val{font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--t1)}
.goal-bar-track{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.goal-bar-fill{height:100%;border-radius:99px;transition:width .8s ease,background .5s}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surf);border:1px solid var(--b);border-radius:var(--r);padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-h{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--t1);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;margin-top:-4px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:'Syne',sans-serif}
.field input,.field textarea,.field select{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b);
  border-radius:7px;color:var(--t1);font-size:13px;font-family:'Inter',sans-serif;
  padding:9px 12px;outline:none;transition:border-color .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(var(--ar),.4)}
.field select{background-color:#0D0D1A}

/* ── CONFETTI ── */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;z-index:999;pointer-events:none;animation:confettiFall 3s ease forwards}

/* ══════════════════════════════════
   ── MOBILE FIRST (NOVO v13) ──
══════════════════════════════════ */

/* Bottom Nav */
#bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:56px;
  background:var(--surf);
  border-top:1px solid var(--b);
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;
  background:transparent;color:var(--t3);
  font-size:10px;font-weight:600;
  font-family:'Inter',sans-serif;
  min-height:44px;transition:color .15s;
}
.bnav-item.on{color:var(--a)}
.bnav-ico{font-size:20px}

/* Drawer Mobile */
#drawer{
  position:fixed;top:0;left:0;bottom:0;
  width:260px;background:var(--surf);
  border-right:1px solid var(--b);
  z-index:350;transform:translateX(-100%);
  transition:transform .25s ease;overflow-y:auto;
}
#drawer.open{transform:translateX(0)}
#drawer-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:340;display:none;
}
#drawer-overlay.open{display:block}
.drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--b)}
.drawer-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:22px;min-height:44px;min-width:44px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #bottom-nav{display:flex}
  #side{display:none}
  #main{padding-bottom:72px}
  .t-burger{display:flex}
  .t-brand{width:auto;min-width:auto;border-right:none;padding:0 8px}
  .t-brand.col{width:auto;min-width:auto}
  .t-info{display:none}
  .t-ctx{display:none}
  .t-mid{padding:0 8px}
  .t-focus{max-width:none}
  .t-right{padding:0 8px;gap:5px}
  .t-clock{display:none}
  #chat-btn{bottom:72px;right:12px}
  #chat-win{right:12px;left:12px;width:auto;bottom:128px}
  .pw{padding:16px}
  .g2{grid-template-columns:1fr}
  .g3{grid-template-columns:1fr}
  .gauto{grid-template-columns:1fr}
  .pipe-wrap{grid-template-columns:1fr}
  .pg-h{font-size:20px}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{border-radius:var(--r) var(--r) 0 0;max-height:90vh}
  #toast{bottom:72px;max-width:calc(100vw - 32px);white-space:normal;text-align:center}
}
@media(min-width:769px) and (max-width:1024px){
  .g3{grid-template-columns:1fr 1fr}
  .pipe-wrap{grid-template-columns:1fr}
  .pw{padding:20px 22px}
}

function renderMarkdown(txt){
  return txt
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/###\s(.+)/g,'<h3>$1</h3>')
    .replace(/##\s(.+)/g,'<h3>$1</h3>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>')
    .replace(/\n{2,}/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

   Padrão: Pollinations.ai (gratuito, sem API key, funciona direto).
   Upgrade opcional: OpenAI ou Anthropic se a chave estiver configurada.
──────────────────────────────────────────────────────── */
function aiProvider(){
  if(st.integrations?.openai?.key)return'openai';
  if(st.integrations?.anthropic?.key)return'anthropic';
  return'free'; // Pollinations.ai — sem chave, sem custo
}

async function callAI(systemPrompt, userPrompt, maxTokens=1000){
  const provider=aiProvider();

  if(provider==='openai'){
    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+st.integrations.openai.key},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        max_tokens:maxTokens,
        messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],
      }),
    });
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||resp.status);}
    const d=await resp.json();
    return d.choices&&d.choices[0]?d.choices[0].message.content:'';
  }

  if(provider==='anthropic'){
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':st.integrations.anthropic.key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:maxTokens,
        system:systemPrompt,
        messages:[{role:'user',content:userPrompt}],
      }),
    });
    if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||resp.status);}
    const d=await resp.json();
    return d.content&&d.content[0]?d.content[0].text:'';
  }

  // Pollinations.ai — gratuito, sem chave
  const resp=await fetch('https://text.pollinations.ai/',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}],
      model:'openai',
      seed:-1,
      private:true,
    }),
  });
  if(!resp.ok)throw new Error('Pollinations error '+resp.status);
  return await resp.text();
}

const DAYS=['mon','tue','wed','thu','fri','sat','sun'];
const DAYS_PT=['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];

function getCurrentWeekKey(){
  const now=new Date();
  const jan1=new Date(now.getFullYear(),0,1);
  const wk=Math.ceil(((now-jan1)/86400000+jan1.getDay()+1)/7);
  return`${now.getFullYear()}-W${String(wk).padStart(2,'0')}`;
}

function getDayDate(dayKey){
  const now=new Date();
  const dow=now.getDay();// 0=sun
  const idx=DAYS.indexOf(dayKey);
  if(idx<0)return now;
  // mon=0..sun=6 → js: sun=0,mon=1...
  const jsIdx=idx===6?0:idx+1;
  const diff=jsIdx-dow;
  const d=new Date(now);
  d.setDate(now.getDate()+diff);
  return d;
}

function getWeekBlocks(){
  const wk=getCurrentWeekKey();
  if(!st.agenda.week[wk]){
    st.agenda.week[wk]={};
    DAYS.forEach(d=>{
      st.agenda.week[wk][d]=[...(st.agenda.fixed[d]||[]).map(b=>({...b,id:'blk_'+Date.now()+'_'+Math.random().toString(36).slice(2)}))];
    });
    save();
  }
  return st.agenda.week[wk];
}

function formatGCalDate(date,time,addMin=0){
  const d=new Date(date);
  const[h,m]=time.split(':').map(Number);
  d.setHours(h,m+addMin,0,0);
  return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
}

function sendToGCal(block,date){
  const start=formatGCalDate(date,block.time);
  const end=formatGCalDate(date,block.time,block.duration||60);
  const url=`https://calendar.google.com/calendar/r/eventedit?`
    +`text=${encodeURIComponent('MRC: '+block.label)}&`
    +`dates=${start}/${end}&`
    +`details=${encodeURIComponent('Gerado pelo MRC OS v13')}&sf=true`;
  window.open(url,'_blank');
  block.gcal=true;save();
}

async function sendWeekToGCal(){
  const wb=getWeekBlocks();
  let count=0;
  for(const[day,blocks] of Object.entries(wb)){
    for(const block of blocks){
      if(!block.gcal){sendToGCal(block,getDayDate(day));count++;await sleep(800);}
    }
  }
  toast(`✓ ${count} bloco(s) enviado(s) ao Google Calendar`);
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

  <div class="tab-bar">
    <button class="tab-item${tab==='week'?' on':''}" onclick="agendaTab='week';renderAgenda(document.getElementById('main'))">Semana</button>
    <button class="tab-item${tab==='today'?' on':''}" onclick="agendaTab='today';renderAgenda(document.getElementById('main'))">Hoje</button>
    <button class="tab-item${tab==='fixed'?' on':''}" onclick="agendaTab='fixed';renderAgenda(document.getElementById('main'))">Blocos Fixos</button>
  </div>

  <div id="agenda-body"></div>
  </div>`;

  const body=document.getElementById('agenda-body');
  if(!body)return;

  if(tab==='week'){
    body.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">
      ${DAYS.slice(0,6).map((d,i)=>{
        const isToday=d===todayDayKey;
        const blocks=wb[d]||[];
        const dayDate=getDayDate(d);
        const dateStr=dayDate.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
        return`<div class="agenda-day${isToday?' today':''}">
          <div class="agenda-day-hd">
            <div class="agenda-day-name">${isToday?'🔵 ':''} ${DAYS_PT[i]}</div>

              <span class="agenda-day-date">${dateStr}</span>
              <button onclick="addManualBlock('${d}')" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;min-height:28px;min-width:28px">+</button>
            </div>
          </div>
          <div class="agenda-blocks">
            ${blocks.length?blocks.map(b=>`
              <div class="agenda-block${b.done?' done-blk':''}" onclick="toggleBlockDone('${wk}','${d}','${b.id}')">
                <div class="agenda-block-bar" style="background:${b.color}"></div>
                <span class="agenda-block-time">${b.time}</span>
                <span class="agenda-block-ico">${b.icon||'📌'}</span>
                <span class="agenda-block-label">${b.label}</span>
                <button onclick="event.stopPropagation();sendToGCal(${JSON.stringify(b).replace(/"/g,"'")},getDayDate('${d}'))" title="Enviar ao GCal" style="background:none;border:none;color:${b.gcal?'#16A854':'var(--t3)'};cursor:pointer;font-size:12px;min-height:28px;min-width:28px">📅</button>
              </div>`).join(''):`<div class="agenda-empty">Sem blocos — clique + para adicionar</div>`}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }else if(tab==='today'){
    const blocks=wb[todayDayKey]||[];
    body.innerHTML=`<div class="agenda-day today" style="max-width:600px">
      <div class="agenda-day-hd">
        <div class="agenda-day-name">📍 Hoje — ${DAYS_PT[DAYS.indexOf(todayDayKey)]}</div>
        <button onclick="addManualBlock('${todayDayKey}')" class="btn btn-g btn-sm">+ Adicionar</button>
      </div>
      <div class="agenda-blocks">
        ${blocks.length?blocks.map(b=>`
          <div class="agenda-block${b.done?' done-blk':''}" onclick="toggleBlockDone('${wk}','${todayDayKey}','${b.id}')">
            <div class="agenda-block-bar" style="background:${b.color};width:4px;min-height:40px"></div>
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                <span class="agenda-block-ico">${b.icon||'📌'}</span>
                <span class="agenda-block-label" style="font-size:14px">${b.label}</span>
              </div>
              <div style="display:flex;gap:12px">
                <span class="agenda-block-time" style="font-size:11px">${b.time}</span>
                <span class="agenda-block-dur">${b.duration||60}min</span>
                ${b.bizRef?`<span class="tag tag-purple">${b.bizRef}</span>`:''}
              </div>
            </div>
            <div style="display:flex;gap:4px">
              ${b.done?'<span style="color:#16A854;font-size:16px">✅</span>':'<span style="color:var(--t3);font-size:14px">○</span>'}
              <button onclick="event.stopPropagation();sendToGCal(${JSON.stringify(b).replace(/"/g,"'")},new Date())" style="background:none;border:none;color:${b.gcal?'#16A854':'var(--t3)'};cursor:pointer;font-size:14px;min-height:32px;min-width:32px">📅</button>
            </div>
          </div>`).join(''):`<div class="agenda-empty" style="padding:24px">Sem blocos hoje. Use IA para gerar ou adicione manualmente.</div>`}
      </div>
    </div>`;
  }else{// fixed
    body.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px">
      ${DAYS.slice(0,7).map((d,i)=>{
        const blocks=st.agenda.fixed[d]||[];
        return`<div class="card">
          <div class="sec-lbl" style="margin-bottom:10px">${DAYS_PT[i]}</div>
          ${blocks.map(b=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)">
            <span>${b.icon}</span>
            <div style="flex:1;font-size:12px;color:var(--t1)">${b.label}</div>
            <span class="dimx">${b.time}</span>
          </div>`).join('')}
          ${!blocks.length?'<div class="dimx">Sem blocos fixos</div>':''}
          <button onclick="addFixedBlock('${d}')" class="btn btn-g btn-xs" style="margin-top:10px;width:100%">+ Adicionar fixo</button>
        </div>`;
      }).join('')}
    </div>`;
  }
}

function addFixedBlock(day){
  const label=prompt('Nome do bloco fixo:');if(!label)return;
  const time=prompt('Horário (HH:MM):','09:00')||'09:00';
  const icon=prompt('Emoji:','📌')||'📌';
  if(!st.agenda.fixed[day])st.agenda.fixed[day]=[];
  st.agenda.fixed[day].push({
    time,duration:60,label,color:'#8B5CF6',icon,
    id:'fx_'+Date.now(),source:'fixed',gcal:false,done:false,bizRef:null,
  });
  save();renderAgenda(document.getElementById('main'));
}

function renderLab(el){
  el.innerHTML=`<div class="pw fade">
  <div class="pg-h" style="color:${TH.lab.a}">🧪 Laboratório IA</div>
  <div class="pg-sub">Ferramentas ativas · Bootcamp de conhecimento</div>

  <div class="tab-bar" style="margin-top:16px">
    <button class="tab-item${labTab==='content'?' on':''}" onclick="labTab='content';renderLab(document.getElementById('main'))">🛠 Trilha 1 — Ferramentas</button>
    <button class="tab-item${labTab==='bootcamp'?' on':''}" onclick="labTab='bootcamp';renderLab(document.getElementById('main'))">🎓 Trilha 2 — Bootcamp</button>

  const tools=st.lab.tools;

  const costBRL=Math.round(costUSD*5.8);

  el.innerHTML=`
  <!-- COST BANNER -->
  <div class="card" style="margin-bottom:16px;border-color:rgba(168,85,247,.2)">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div>
        <div class="sec-lbl" style="color:#A855F7">💰 Custo mensal de ferramentas IA</div>
        <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--t1);margin-top:4px">US$${costUSD}/mês <span style="font-size:14px;color:var(--t3)">≈ R$${costBRL.toLocaleString('pt-BR')}</span></div>
      </div>
      <div style="text-align:right">
        <div class="dimx">Ferramentas ativas: ${activeTools.length}</div>
        <div class="dimx">Em teste: ${tools.filter(t=>t.status==='testando').length} (gratuitas)</div>
      </div>
    </div>
  </div>

  <!-- SUGGEST TOOL -->
  <div class="card" style="margin-bottom:16px">
    <div class="sec-lbl" style="margin-bottom:10px">💬 Qual ferramenta usar para esta tarefa?</div>
    <div style="display:flex;gap:8px">
      <input id="tool-task-inp" class="fin-inp" style="flex:1;width:auto;text-align:left" placeholder="Ex: dublar vídeo para inglês, criar site, automatizar relatório..."/>
      <button class="btn btn-a" onclick="suggestToolForTask(document.getElementById('tool-task-inp').value)">Perguntar IA</button>
    </div>
    <div id="tool-suggest-result" style="margin-top:12px"></div>
  </div>

  <!-- TOOLS GRID -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">
    ${tools.map(t=>renderToolCard(t)).join('')}
    <div class="card" style="border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:120px;cursor:pointer" onclick="addNewTool()">
      <div style="font-size:28px">+</div>

function renderToolCard(tool){
  const statusColor={'ativo':'#16A854','testando':'#E8A820','arquivado':'rgba(255,255,255,.2)'}[tool.status]||'var(--t3)';
  const tests=st.lab.toolTests[tool.id]||[];
  return`<div class="card" style="border-top:3px solid ${statusColor}">
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
      <div style="font-size:24px;flex-shrink:0">${tool.icon}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:var(--t1)">${tool.name}</div>
        <div class="dimx">${tool.category} · ${tool.costUnit}</div>
      </div>
      <span class="tag" style="background:${statusColor}20;color:${statusColor}">${tool.status}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">
      ${tool.tags.map(tg=>`<span class="tag tag-purple">${tg}</span>`).join('')}
    </div>
    ${tool.cost>0?`<div style="font-size:13px;font-weight:700;color:#E8A820;font-family:'JetBrains Mono',monospace;margin-bottom:8px">US$${tool.cost}/mês</div>`:'<div style="font-size:12px;color:#16A854;margin-bottom:8px">✓ Gratuita</div>'}
    ${tests.length?`<div class="dimx" style="margin-bottom:8px">${tests.length} teste(s) registrado(s)</div>`:''}
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-g btn-xs" onclick="addToolTest('${tool.id}')">📝 Registrar teste</button>
      ${tool.status!=='ativo'?`<button class="btn btn-xs" style="background:rgba(22,168,84,.1);color:#16A854;border:1px solid rgba(22,168,84,.2)" onclick="activateTool('${tool.id}')">✓ Ativar</button>`:''}
    </div>
  </div>`;
}

function addNewTool(){
  const name=prompt('Nome da ferramenta:');if(!name)return;
  const icon=prompt('Emoji:','🔧')||'🔧';
  const cost=+prompt('Custo USD/mês (0 se gratuito):','0')||0;
  const tags=(prompt('Tags (separadas por vírgula):','IA,automação')||'').split(',').map(t=>t.trim()).filter(Boolean);
  st.lab.tools.push({id:'tool_'+Date.now(),name,category:'outro',status:'testando',cost,costUnit:cost?'USD/mês':'free',icon,tags,notes:''});
  save();renderLab(document.getElementById('main'));
}

function activateTool(id){
  const t=st.lab.tools.find(x=>x.id===id);
  if(t){t.status='ativo';save();renderLab(document.getElementById('main'));toast('✅ Ferramenta ativada');}
}

function addToolTest(toolId){
  const task=prompt('O que você testou?');if(!task)return;
  const result=prompt('Resultado? (1=✅ 2=⚠️ 3=❌)','1');
  const obs=prompt('Observação (opcional):');
  const icons={1:'✅',2:'⚠️',3:'❌'};
  if(!st.lab.toolTests[toolId])st.lab.toolTests[toolId]=[];
  st.lab.toolTests[toolId].push({
    task,result:icons[result]||'✅',obs:obs||'',
    date:new Date().toLocaleDateString('pt-BR'),time:Math.round(+prompt('Tempo gasto (minutos):','30')||30),
  });
  save();renderLab(document.getElementById('main'));toast('📝 Teste registrado!');
}

async function suggestToolForTask(task){
  if(!task.trim()){toast('Digite uma tarefa primeiro');return;}
  const el=document.getElementById('tool-suggest-result');
  if(el)el.innerHTML='<div class="skel skel-line w85"></div><div class="skel skel-line w70"></div>';
  const tools=st.lab.tools.filter(t=>t.status!=='arquivado').map(t=>`${t.name} (${t.status}, ${t.costUnit}, tags: ${t.tags.join(',')})`).join('; ');
  const prompt=`Mauricio quer: "${task}". 
Ferramentas disponíveis: ${tools}.
Qual(is) ferramenta(s) usar? Como? Seja direto. Máximo 3 frases.`;
  try{
    const txt=await callAI('Responda em português brasileiro, de forma direta e prática.',prompt,300);
    if(el)el.innerHTML=`<div class="ai-panel" style="margin-top:0">${renderMarkdown(txt)}</div>`;
  }catch(e){if(el)el.innerHTML='<div class="dimx">❌ Erro ao consultar IA. Verifique sua chave em Config.</div>';}
}

function renderBootcampTab(el){
  const totalXP=BOOTCAMP_MODULES.reduce((a,m)=>a+m.lessons.reduce((b,l)=>b+l.xp,0),0);
  const earnedXP=BOOTCAMP_MODULES.reduce((a,m)=>a+m.lessons.reduce((b,l)=>b+(st.lab.bootcamp.lessonsDone[l.id]?l.xp:0),0),0);
  const pct=Math.round(earnedXP/totalXP*100)||0;
  const totalExtra=Object.values(BOOTCAMP_COSTS).reduce((a,c)=>a+c.monthlyCost,0);

  el.innerHTML=`
  <!-- PROGRESS -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="sec-lbl">📊 Progresso do Bootcamp</div>
      <span style="font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--a)">${earnedXP} / ${totalXP} XP</span>
    </div>
    <div class="bar bar-lg" style="height:8px"><div class="bar-f" style="width:${pct}%;background:var(--a)"></div></div>
    <div class="dimx" style="margin-top:6px">Custo adicional total se ativar tudo: apenas R$${totalExtra}/mês além do que já paga</div>
  </div>

  <!-- MODULES -->
  <div style="display:flex;flex-direction:column;gap:14px">
    ${BOOTCAMP_MODULES.map(m=>renderModuleTrack(m)).join('')}
  </div>`;
}

function isModuleUnlocked(moduleId){
  const mod=BOOTCAMP_MODULES.find(m=>m.id===moduleId);
  if(!mod||!mod.unlockReq)return true;
  const req=BOOTCAMP_MODULES.find(m=>m.id===mod.unlockReq);
  if(!req)return true;
  return req.lessons.every(l=>st.lab.bootcamp.lessonsDone[l.id]);
}

function renderModuleTrack(mod){
  const unlocked=isModuleUnlocked(mod.id);
  const doneLessons=mod.lessons.filter(l=>st.lab.bootcamp.lessonsDone[l.id]).length;
  const pct=Math.round(doneLessons/mod.lessons.length*100);
  const cost=BOOTCAMP_COSTS[mod.id];

  return`<div class="card${!unlocked?' pi-lock':''}">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:${unlocked?12:6}px">
      <div style="width:40px;height:40px;border-radius:50%;background:${mod.color}20;border:2px solid ${mod.color};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${unlocked?mod.icon:'🔒'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:700;color:${unlocked?'var(--t1)':'var(--t3)'}">${mod.title}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
          <span class="dimx">${doneLessons}/${mod.lessons.length} lições</span>
          <span class="tag" style="background:${mod.color}20;color:${mod.color}">+${mod.xpReward} XP</span>
          ${cost?`<span class="dimx">${cost.free?'Gratuito':'R$'+cost.monthlyCost+'/mês'}</span>`:''}
        </div>
      </div>
      ${unlocked?`<div style="width:36px;height:36px;flex-shrink:0"><svg viewBox="0 0 36 36"><circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/><circle cx="18" cy="18" r="16" fill="none" stroke="${mod.color}" stroke-width="3" stroke-dasharray="${Math.round(100.5*pct/100)} 100.5" stroke-dashoffset="25.2" stroke-linecap="round"/></svg></div>`:''}
    </div>
    ${!unlocked?`<div class="dimx" style="padding:0 4px">🔒 Complete "${BOOTCAMP_MODULES.find(m=>m.id===mod.unlockReq)?.title||'módulo anterior'}" primeiro</div>`:
    `<div style="display:flex;flex-direction:column">
      ${mod.lessons.map((l,i)=>{
        const done=!!st.lab.bootcamp.lessonsDone[l.id];
        const isDesafio=l.type==='desafio';
        const canDesafio=!isDesafio||mod.lessons.filter(x=>x.type!=='desafio').every(x=>st.lab.bootcamp.lessonsDone[x.id]);
        const locked=isDesafio&&!canDesafio;
        return`<div class="track-step${i===mod.lessons.length-1?' last':''}">
          <div class="step-ico ${done?'step-done':locked?'step-locked':'step-active'}">${done?'✅':locked?'🔒':l.type==='teoria'?'📖':l.type==='pratica'?'⚡':l.type==='projeto'?'🛠':'🏆'}</div>
          <div class="step-body">
            <div class="step-title" style="color:${done?'var(--t3)':locked?'var(--t3)':'var(--t1)'}">${l.title}</div>
            <div class="step-meta">+${isDesafio?l.xp*2:l.xp} XP · ${l.type}${isDesafio?' (XP dobrado)':''}</div>
            ${!done&&!locked?`<div class="step-actions">
              <button class="btn btn-a btn-xs" onclick="openLesson('${mod.id}','${l.id}')">Abrir lição</button>
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

async function openLesson(moduleId,lessonId){
  const mod=BOOTCAMP_MODULES.find(m=>m.id===moduleId);
  const lesson=mod&&mod.lessons.find(l=>l.id===lessonId);
  if(!lesson)return;

  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-h">${lesson.icon||'📖'} ${lesson.title}</div>
      <div id="lesson-content"><div class="skel skel-line w95"></div><div class="skel skel-line w85"></div><div class="skel skel-line w70"></div><div class="skel skel-line w50"></div></div>
      <div style="margin-top:16px" id="lesson-actions"></div>
    </div>
  </div>`;

  const prompt=`Explique de forma prática para um empreendedor brasileiro sem background técnico:
"${lesson.title}".
Contexto: ele gerencia 7+ negócios, usa no-code, quer aprender para aplicar
no AmazonIA Intelligence Platform e em outros SaaS.
Seja direto. Use exemplos reais do ecossistema dele.
Máximo 200 palavras + 1 exemplo prático concreto.`;

  try{
    const txt=await callAI('Responda em português brasileiro, de forma direta, prática e motivadora.',prompt,500);
    const lc=document.getElementById('lesson-content');
    if(lc)lc.innerHTML=`<div class="ai-content">${renderMarkdown(txt||'Conteúdo não disponível.')}</div>`;
  }catch(e){
    const lc=document.getElementById('lesson-content');
    if(lc)lc.innerHTML='<div class="dimx">❌ Erro ao carregar conteúdo. Verifique conexão e sua chave em Config.</div>';
  }

  const la=document.getElementById('lesson-actions');
  if(!la)return;
  if(lesson.type==='teoria'){
    la.innerHTML=`<button class="btn btn-a" style="width:100%" onclick="completeLesson('${moduleId}','${lessonId}','')">✅ Marcar como lida (+${lesson.xp} XP)</button>`;
  }else{
    la.innerHTML=`<div class="field"><label>O que você fez na prática?</label><textarea id="lesson-notes" placeholder="Descreva o que aplicou..." rows="3"></textarea></div>
    <button class="btn btn-a" style="width:100%" onclick="completeLesson('${moduleId}','${lessonId}',document.getElementById('lesson-notes').value)">✅ Concluir (+${lesson.type==='desafio'?lesson.xp*2:lesson.xp} XP)</button>`;
  }
}

function completeLesson(moduleId,lessonId,notes){
  const mod=BOOTCAMP_MODULES.find(m=>m.id===moduleId);
  const lesson=mod&&mod.lessons.find(l=>l.id===lessonId);
  if(!lesson)return;
  const xp=lesson.type==='desafio'?lesson.xp*2:lesson.xp;
  st.lab.bootcamp.lessonsDone[lessonId]=true;
  if(notes)st.lab.bootcamp.notes[lessonId]=notes;
  st.xp+=xp;
  save();closeModal();updateTop();
  toast(`🎓 +${xp} XP — "${lesson.title}" concluída!`);
  setTimeout(()=>renderLab(document.getElementById('main')),200);
}

function closeModal(){
  const root=document.getElementById('modal-root');
  if(root)root.innerHTML='';
}

function configIntegration(id){

  st.integrations[id].key=key;
  st.integrations[id].active=true;

async function testIntegration(id){
  toast(`⟳ Testando ${st.integrations[id]?.label||id}...`);
  if(id==='make_hook'&&st.integrations.make_hook.key){

      await fetch(st.integrations.make_hook.key,{method:'POST',body:JSON.stringify({test:true,timestamp:Date.now()})});

    }catch(e){toast('❌ Erro ao testar webhook');}

    toast('✅ Automação disparada para '+clientId);
  }catch(e){toast('❌ Erro ao disparar webhook');}

   XP / LEVEL
═══════════════════════════════════════════════════ */
function lvl(){
  const x=st.xp;
  const levels=[
    {n:'Iniciante',min:0,max:199},{n:'Executor',min:200,max:499},
    {n:'Estrategista',min:500,max:999},{n:'Fundador',min:1000,max:1999},
    {n:'Builder',min:2000,max:4999},{n:'Visionário',min:5000,max:Infinity},
  ];
  return levels.find(l=>x>=l.min&&x<=l.max)||levels[0];
}

function statusRing(pct,color,size=52){
  const r=22;const circ=2*Math.PI*r;
  const off=circ-(pct/100)*circ;
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/>
  </svg>`;
}

/* ═══════════════════════════════════════════════════
   GOAL BAR — META R$10k
═══════════════════════════════════════════════════ */
function renderGoalBar(){
  const rev=totalRev();const pct=calcGoalPct();
  const barColor=pct<30?'#EF4444':pct<70?'#E8A820':'#16A854';
  const goalEl=document.getElementById('top-goal-pill');
  if(goalEl){
    goalEl.style.display='flex';
    goalEl.style.background=`rgba(${pct<30?'239,68,68':pct<70?'232,168,32':'22,168,84'},.08)`;
    goalEl.style.borderColor=`rgba(${pct<30?'239,68,68':pct<70?'232,168,32':'22,168,84'},.25)`;
    goalEl.style.color=barColor;
    goalEl.textContent=`${pct}% da meta R$10k`;
  }
  if(pct>=100)fireConfetti();
  return`<div class="goal-bar-wrap">
    <div class="goal-bar-top">
      <div class="goal-bar-label">🎯 Meta familiar R$10.000/mês</div>
      <div class="goal-bar-val" style="color:${barColor}">R$${rev.toLocaleString('pt-BR')}</div>
    </div>
    <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="dimx" style="margin-top:4px">${pct}% atingido · faltam R$${Math.max(0,10000-rev).toLocaleString('pt-BR')}</div>
  </div>`;
}

function fireConfetti(){
  const colors=['#7C3AED','#16A854','#E8A820','#EC4899','#06B6D4'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.animationDelay=(Math.random()*2)+'s';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

function updateClock(){
  const now=new Date();
  const hm=document.getElementById('clk-hm');

  if(hm)hm.textContent=now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

}

   TIMER
═══════════════════════════════════════════════════ */
let tmrSecs=0,tmrRunning=false,tmrIv=null,tmrLabel='';
function fT(s){return`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function tmrTick(){tmrSecs++;const d=document.getElementById('timer-disp');if(d)d.textContent=fT(tmrSecs);updateTop();}
function tmrStart(lbl=''){if(lbl)tmrLabel=lbl;tmrRunning=true;tmrIv=setInterval(tmrTick,1000);updateTop();}
function tmrPause(){tmrRunning=false;clearInterval(tmrIv);updateTop();}
function timerStop(){tmrPause();tmrSecs=0;if(pg==='timer')render();updateTop();}

   TOPBAR UPDATE
═══════════════════════════════════════════════════ */
function updateTop(){
  const uc=urgCount();
  const al=document.getElementById('top-alerts');
  if(al)al.innerHTML=uc?`<button class="t-alert-btn blink" onclick="go('alphaoutfit')">● ${uc} entrega${uc>1?'s':''} urgente${uc>1?'s':''}</button>`:'';

  const xpEl=document.getElementById('top-xp');
  if(xpEl)xpEl.textContent=`${st.xp} XP · ${lvl().n}`;

  const ctx=document.getElementById('ctx-lbl');
  const dot=document.getElementById('ctx-dot');
  if(ctx)ctx.textContent=T.lbl||'Central';
  if(dot){dot.style.background=T.a;dot.style.boxShadow=`0 0 8px ${T.a}`;}

  const tt=document.getElementById('top-timer');
  if(tt){
    if(tmrRunning){tt.style.display='flex';tt.innerHTML=`<span style="font-size:10px;color:#EF4444;font-weight:700">⏱ ${tmrLabel||'Timer'}</span><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#EF4444">${fT(tmrSecs)}</span>`;}
    else tt.style.display='none';
  }

  const nb=document.getElementById('nb-tmr');
  if(nb)nb.style.display=tmrRunning?'':'none';

  const xw=document.getElementById('xp-wrap');
  if(xw){
    const l=lvl();
    const pct=Math.min(100,Math.round((st.xp-l.min)/(l.max===Infinity?st.xp+1:l.max-l.min)*100));
    xw.innerHTML=`<div class="s-xp-ring">${statusRing(pct,T.a,36)}<span class="s-lvl">${l.n} · ${st.xp} XP</span></div>`;
  }

  updateSidebarBadges();
  renderGoalBar();
}

function render(){
  const m=document.getElementById('main');
  if(!m)return;
  if(pg==='home'){renderHome(m);return;}
  if(pg==='config'){renderConfig(m);return;}
  if(pg==='timer'){renderTimer(m);return;}
  if(pg==='agenda'){renderAgenda(m);return;}
  if(pg==='lab'){renderLab(m);return;}
  if(pg==='social'){renderSocial(m);return;}
  if(pg==='videos'){renderVideos(m);return;}
  if(pg==='ads'){renderAds(m);return;}
  if(pg==='amazoniaplat'){renderAmazonIA(m);return;}
  if(pg==='idesapg'){renderIDESA(m);return;}
  if(pg==='entidades'){renderEntidades(m);return;}
  if(CLIENTS[pg]){renderClient(m,pg);return;}
  if(BIZ[pg]){renderBiz(m,pg);return;}
  renderHome(m);
}

}

function bizTask(bizId,taskId,taskName){
  st.taskDone[taskId]=!st.taskDone[taskId];

}

  scheduleAI(id+'-ai',`Cliente ${c.name}: contrato R$${c.contractVal}/mês. Saúde: ${s}%. Upsell disponível: ${c.upsell}. Qual a estratégia para aumentar o ticket e garantir renovação?`,id+'_client',{});
}

function toggleDelivery(cid,did,wasDone){
  if(!st.deliveries[cid])st.deliveries[cid]={};
  st.deliveries[cid][did]=!wasDone;
  if(!wasDone){st.xp+=10;toast('✅ +10 XP');}else st.xp=Math.max(0,st.xp-10);
  save();updateTop();renderClient(document.getElementById('main'),cid);
}
function toggleExtra(cid,idx){
  st.extras[cid][idx].done=!st.extras[cid][idx].done;
  if(st.extras[cid][idx].done){st.xp+=15;toast('✅ +15 XP');}else st.xp=Math.max(0,st.xp-15);
  save();updateTop();renderClient(document.getElementById('main'),cid);
}
function addExtra(cid){
  const t=prompt('Nova tarefa:');if(!t)return;
  const d=prompt('Prazo (ex: Esta semana):');
  st.extras[cid].push({id:'ex'+Date.now(),t,deadline:d||'',priority:'normal',done:false});
  save();renderClient(document.getElementById('main'),cid);
}
function saveSat(cid){
  const s=document.getElementById('sat-slider-'+cid);
  if(s){st.satOvr[cid]=+s.value;save();updateTop();renderClient(document.getElementById('main'),cid);}
}

function renderCampaignsList(){if(!st.adsCampaigns||!st.adsCampaigns.length)return'<div class="dimx">Nenhuma campanha registrada.</div>';return st.adsCampaigns.map((c,i)=>`<div class="del-row"><div style="flex:1"><div style="font-size:12px;color:var(--t1)">${c.name}</div><div class="dimx">${c.platform||'—'} · R$${c.budget||0}/mês</div></div><button onclick="removecamp(${i})" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;min-height:32px;min-width:32px">✕</button></div>`).join('');}
function addCampaign(){const name=prompt('Nome da campanha:');if(!name)return;const pl=prompt('Plataforma:');const budget=+prompt('Budget R$/mês:')||0;if(!st.adsCampaigns)st.adsCampaigns=[];st.adsCampaigns.push({name,platform:pl||'',budget});save();render();}
function removecamp(i){st.adsCampaigns.splice(i,1);save();render();}

/* ═══════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════ */
function renderTimer(el){
  el.innerHTML=`<div class="pw fade" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:24px">
  <div class="sec-lbl" id="timer-lbl-pg">${tmrLabel||'Cronômetro'}</div>
  <div class="timer-display" id="timer-disp">${fT(tmrSecs)}</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-a" style="font-size:14px;padding:10px 24px" onclick="${tmrRunning?'tmrPause()':'tmrStart()'}">${tmrRunning?'⏸ Pausar':'▶ Iniciar'}</button>
    <button class="btn btn-g" style="font-size:14px;padding:10px 24px" onclick="timerStop()">⏹ Zerar</button>
  </div>
  <div class="card" style="max-width:360px;width:100%">
    <div class="sec-lbl" style="margin-bottom:10px">Iniciar com tarefa</div>
    <input id="timer-task-inp" class="fin-inp" style="width:100%;text-align:left;margin-bottom:10px" placeholder="Nome da tarefa..."/>
    <button class="btn btn-a btn-sm" onclick="startTimerWithTask()">▶ Iniciar com esta tarefa</button>
  </div>
  </div>`;
}
function startTimerWithTask(){const inp=document.getElementById('timer-task-inp');if(inp&&inp.value.trim()){tmrStart(inp.value.trim());render();}}

/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
function renderConfig(el){
  const saves=st._saveCount||0;
  const last=st._lastSave?new Date(st._lastSave).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'—';
  const freeAI=aiProvider()==='free';
  el.innerHTML=`<div class="pw fade">
  <div class="pg-h">⚙️ Config &amp; Integrações</div>
  <div class="pg-sub">Configurações, dados e integrações do MRC OS v13</div>

  <div class="card" style="margin-top:20px;margin-bottom:14px;border:1px solid rgba(22,168,84,.25);background:rgba(22,168,84,.05)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span style="font-size:18px">🤖</span>
      <span style="font-size:13px;font-weight:700;color:#16A854">IA ativa${freeAI?' — modo gratuito (Pollinations.ai)':' — chave configurada'}</span>
    </div>
    <div class="dim" style="font-size:12px">${freeAI?'Funcionando sem custo. Para respostas mais rápidas e precisas, configure uma chave OpenAI ou Anthropic abaixo.':'Usando chave de API configurada. Remova para voltar ao modo gratuito.'}</div>
    ${freeAI?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
      <button class="btn btn-g btn-xs" onclick="configIntegration('openai')">⚡ Upgrade OpenAI</button>
      <button class="btn btn-g btn-xs" onclick="configIntegration('anthropic')">⚡ Upgrade Anthropic</button>
    </div>`:''}
  </div>

  <div class="card" style="margin-top:0;margin-bottom:14px">
    <div class="sec-lbl" style="margin-bottom:12px">📊 Estado do Sistema</div>
    ${[{l:'Versão',v:'MRC OS v13'},{l:'Salvamentos',v:saves+' vezes'},{l:'Último save',v:last},{l:'XP total',v:st.xp+' XP'},{l:'Nível',v:lvl().n},{l:'Tarefas concluídas',v:Object.values(st.taskDone).filter(Boolean).length},{l:'Armazenamento',v:'localStorage (mrc12 + mrc11 compat)'}].map(r=>`<div class="dig-row"><span class="dig-plat">${r.l}</span><span style="font-size:12px;color:var(--t1);font-family:'JetBrains Mono',monospace">${r.v}</span></div>`).join('')}
  </div>

  <div id="integ-section"></div>

  <div class="card" style="margin-bottom:14px">
    <div class="sec-lbl" style="color:#A855F7;margin-bottom:12px">🤖 Cache IA</div>
    <div class="dim" style="margin-bottom:10px">Análises salvas para evitar reprocessamento.</div>
    <button class="btn btn-g" onclick="clearAICache()">🗑 Limpar cache de IA</button>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="sec-lbl" style="color:#EF4444;margin-bottom:12px">⚠ Dados</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="exportState()">📥 Exportar JSON</button>
      <button class="btn btn-g" onclick="resetXP()">🔄 Zerar XP</button>
      <button class="btn btn-g" style="color:#EF4444;border-color:rgba(239,68,68,.3)" onclick="if(confirm('Apagar todos os dados?')){localStorage.removeItem('mrc12');localStorage.removeItem('mrc11');location.reload()}">🗑 Reset completo</button>
    </div>
  </div>

  <div class="card">
    <div class="sec-lbl" style="margin-bottom:10px">💡 Atalhos v13</div>
    ${[['☰ Hamburguer (mobile)','Abre drawer lateral com menu completo'],['Bottom nav 5 ícones (mobile)','Navegação rápida entre seções'],['⚡ Botão flutuante','Abrir chat MRC AI'],['Clicar em card de negócio','Entrar na página do negócio'],['📅 em bloco de agenda','Enviar ao Google Calendar']].map(([k,v])=>`<div class="dig-row"><span style="font-size:12px;color:var(--t2);min-width:200px;flex-shrink:0">${k}</span><span class="dimx">${v}</span></div>`).join('')}
  </div>
  </div>`;

  const intSection=document.getElementById('integ-section');
  if(intSection)renderIntegrationsConfig(intSection);
}

function clearAICache(){
  Object.keys(localStorage).filter(k=>k.startsWith('mrc12_ai_')).forEach(k=>localStorage.removeItem(k));
  toast('✓ Cache IA limpo');
}
function exportState(){
  const d='mrc-os-state-'+new Date().toISOString().slice(0,10)+'.json';
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(st,null,2));
  a.download=d;a.click();
  toast('✓ Exportado: '+d);
}
function resetXP(){if(confirm('Zerar XP?')){st.xp=0;save();updateTop();toast('XP zerado');}}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
applyT('home');
updateTop();
render();
initMobileNav();
save();
</script>
</body>
</html>
