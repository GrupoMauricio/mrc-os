<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MRC OS v11</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}

/* ── DESIGN TOKENS ── */
:root{
  --a:#7C3AED;--ar:124,58,237;
  --bg:#07070D;--surf:#0C0C14;--card:#111120;--card2:#161626;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --t1:#F0EDF8;--t2:rgba(240,237,248,.6);--t3:rgba(240,237,248,.28);
  --r:14px;--rs:9px;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes glow-in{from{box-shadow:0 0 0 0 var(--a)}to{box-shadow:0 0 16px 0 rgba(var(--ar),.3)}}
.fade{animation:fadeUp .2s ease both}
.blink{animation:pulse 1.3s ease-in-out infinite}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--t1)}

/* ── TOPBAR ── */
#top{
  height:52px;display:flex;align-items:center;gap:0;
  padding:0;flex-shrink:0;
  background:var(--surf);
  border-bottom:1px solid var(--b);
  transition:border-color .35s,background .35s;
  position:relative;z-index:10;
}
.top-brand{
  width:220px;min-width:220px;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  border-right:1px solid var(--b);
  height:100%;flex-shrink:0;
  transition:width .25s,min-width .25s;
}
.top-brand.col{width:56px;min-width:56px;}
.t-mark{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  background:linear-gradient(135deg,var(--a),#4C1D95);
  box-shadow:0 2px 8px rgba(var(--ar),.4);
}
.t-name{font-size:13px;font-weight:800;white-space:nowrap;color:var(--t1)}
.t-ver{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.top-ctx{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;
  border-right:1px solid var(--b);
  height:100%;
}
.ctx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .35s,box-shadow .35s}
.ctx-lbl{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;transition:color .35s}
.top-mid{flex:1;display:flex;align-items:center;padding:0 20px;gap:12px}
.top-obj{
  flex:1;max-width:380px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--b);border-radius:8px;
  color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  padding:6px 12px;outline:none;transition:border-color .15s,background .15s;
}
.top-obj:focus{border-color:rgba(var(--ar),.5);background:rgba(255,255,255,.06)}
.top-obj::placeholder{color:var(--t3);font-weight:400}
.top-right{display:flex;align-items:center;gap:8px;padding:0 20px;flex-shrink:0}
.t-alert-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  color:#EF4444;font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.t-alert-btn:hover{background:rgba(239,68,68,.14)}
.t-timer-pill{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:20px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
}
.t-xp{
  background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.18);
  border-radius:20px;padding:5px 11px;
  font-size:11px;font-weight:700;color:#A855F7;
  font-family:'JetBrains Mono',monospace;white-space:nowrap;
}
.t-clock{
  background:var(--card);border:1px solid var(--b);
  border-radius:9px;padding:5px 13px;
}
.t-hm{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;line-height:1;color:var(--t1)}
.t-sec{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)}
.t-date{font-size:9px;color:var(--t3);text-transform:capitalize;margin-top:1px}

/* ── BODY ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#side{
  width:220px;min-width:220px;
  display:flex;flex-direction:column;
  border-right:1px solid var(--b);
  background:var(--surf);
  transition:width .25s,min-width .25s;
  flex-shrink:0;overflow:hidden;
}
#side.col{width:56px;min-width:56px}
.nav-sc{flex:1;overflow-y:auto;padding:10px 7px;display:flex;flex-direction:column;gap:1px}
.ns{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);padding:12px 8px 5px;white-space:nowrap;overflow:hidden;
}
.ni{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;
  color:var(--t3);width:100%;text-align:left;
  transition:background .12s,color .12s;
  white-space:nowrap;overflow:hidden;
  font-family:inherit;font-size:12px;font-weight:500;
}
.ni:hover{background:rgba(255,255,255,.05);color:var(--t2)}
.ni.on{background:rgba(var(--ar),.1);color:var(--a)}
.ni-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni-lbl{flex:1;font-size:12px}
.ni-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.07);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.ni-dot{width:5px;height:5px;border-radius:50%;background:#EF4444;flex-shrink:0;box-shadow:0 0 4px #EF4444}
.s-foot{padding:8px 7px;border-top:1px solid var(--b);flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.s-xp-wrap{padding:6px 8px 8px;overflow:hidden}
.s-lvl{font-size:9px;font-weight:700;color:var(--a);margin-bottom:5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.col-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;
  color:var(--t3);width:100%;font-family:inherit;font-size:12px;
  transition:all .12s;
}
.col-btn:hover{background:rgba(255,255,255,.05);color:var(--t2)}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden}
.pw{padding:28px 32px;width:100%;max-width:1400px;margin:0 auto}

/* ── TYPOGRAPHY ── */
.pg-h{font-size:24px;font-weight:800;line-height:1.1;color:var(--t1)}
.pg-sub{font-size:13px;color:var(--t2);margin-top:3px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.sec-lbl-a{color:var(--a)}
.dim{color:var(--t2);font-size:13px}
.dimx{color:var(--t3);font-size:11px}
.mono{font-family:'JetBrains Mono',monospace}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.gauto-lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:20px;transition:border-color .2s}
.card-s{padding:16px}
.card-xs{padding:12px 14px}
.card-hover:hover{border-color:var(--b2);transform:translateY(-1px);transition:all .18s}
.card-accent{border-left:3px solid var(--a)!important}
.card-glow{box-shadow:0 0 0 1px rgba(var(--ar),.2),0 4px 24px rgba(var(--ar),.08)}

/* ── BAR ── */
.bar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bar-md{height:6px}
.bar-lg{height:8px}
.bar-f{height:100%;border-radius:99px;transition:width .55s ease}

/* ── INPUT ── */
.inp{
  background:rgba(255,255,255,.05);border:1px solid var(--b);
  border-radius:var(--rs);color:var(--t1);
  font-family:'DM Sans',sans-serif;font-size:13px;
  padding:8px 11px;outline:none;width:100%;
  transition:border-color .15s,background .15s;
}
.inp:focus{border-color:rgba(var(--ar),.5)}
.inp::placeholder{color:var(--t3)}
select.inp{cursor:pointer}
.fin-inp{
  background:rgba(255,255,255,.04);border:1px solid var(--b);
  border-radius:7px;color:var(--t1);
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;
  padding:6px 10px;width:120px;outline:none;text-align:right;
  transition:border-color .15s;
}
.fin-inp:focus{border-color:rgba(var(--ar),.5)}

/* ── BTN ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;transition:all .15s}
.btn-a{color:#07070D}
.btn-g{background:rgba(255,255,255,.07);color:var(--t2)}
.btn-g:hover{background:rgba(255,255,255,.12);color:var(--t1)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-danger{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2)}

/* ── NEXT ACTION HERO ── */
.hero-action{
  background:linear-gradient(135deg,rgba(var(--ar),.1),rgba(var(--ar),.04));
  border:1px solid rgba(var(--ar),.2);
  border-radius:var(--r);padding:18px 22px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.hero-action::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--ar),.4),transparent);
}

/* ── BIZ CARD (home) ── */
.biz-card{
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);padding:18px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.biz-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--bc,rgba(255,255,255,.15));
  transition:opacity .2s;
}
.biz-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.biz-status{font-size:10px;font-weight:700;letter-spacing:.04em}
.biz-pct{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.biz-blocker{
  font-size:11px;color:var(--t3);margin-top:8px;
  padding-top:8px;border-top:1px solid var(--b);
  line-height:1.4;
}
.biz-money{
  font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:3px 8px;border-radius:6px;display:inline-block;
  background:rgba(255,255,255,.05);color:var(--t2);margin-top:4px;
}

/* ── CLIENT HEALTH CARD ── */
.cli-card{
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);padding:18px;cursor:pointer;
  transition:all .2s;position:relative;
}
.cli-card:hover{border-color:var(--b2);transform:translateY(-1px)}
.cli-sat{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.cli-urg{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;
  background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2);
  display:inline-block;margin-top:6px;
}

/* ── PIPELINE ── */
.pipe-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.pipe-col{flex:1;min-width:220px}
.pipe-hd{
  padding:9px 13px;border-radius:var(--rs) var(--rs) 0 0;
  border:1px solid var(--b);border-bottom:none;
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(255,255,255,.03);
}
.pipe-body{
  border:1px solid var(--b);border-radius:0 0 var(--rs) var(--rs);
  padding:10px;display:flex;flex-direction:column;gap:7px;
  min-height:100px;background:rgba(255,255,255,.015);
}
.pipe-item{
  background:var(--card);border:1px solid var(--b);
  border-radius:8px;padding:11px 13px;cursor:pointer;
  transition:all .18s;
}
.pipe-item:hover:not(.pi-lock):not(.pi-done){border-color:var(--b2);background:var(--card2)}
.pipe-item.pi-done{opacity:.35;cursor:default}
.pipe-item.pi-lock{opacity:.45;cursor:default}
.pi-name{font-size:12px;font-weight:600;line-height:1.35;color:var(--t1)}
.pi-done .pi-name{text-decoration:line-through;color:var(--t2)}
.pi-impact{font-size:11px;font-weight:600;margin-top:5px}
.pi-req{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.3}
.pi-ico{font-size:13px;margin-bottom:4px}
.pi-money{
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:2px 7px;border-radius:5px;display:inline-block;
  background:rgba(255,255,255,.06);margin-top:5px;
}

/* ── DELIVERY ── */
.del-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b)}
.del-row:last-child{border-bottom:none}
.chk{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid rgba(255,255,255,.2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:10px;font-weight:800;color:transparent;
  transition:all .18s;user-select:none;
}
.chk.on{color:white}
.urg-tag{
  font-size:9px;padding:2px 7px;border-radius:8px;
  background:rgba(239,68,68,.1);color:#EF4444;
  border:1px solid rgba(239,68,68,.2);font-weight:700;flex-shrink:0;
}
.ok-tag{
  font-size:9px;padding:2px 7px;border-radius:8px;
  background:rgba(22,168,84,.1);color:#16A854;
  border:1px solid rgba(22,168,84,.2);font-weight:700;flex-shrink:0;
}

/* ── EXTRA DEMAND ── */
.extra-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 13px;background:var(--card2);
  border-radius:var(--rs);border:1px solid var(--b);
  margin-bottom:7px;transition:border-color .15s;
}
.extra-item:hover{border-color:var(--b2)}
.add-form{display:none;background:var(--card2);border-radius:var(--rs);padding:14px;margin-bottom:10px;border:1px solid var(--b)}

/* ── STAT BLOCK ── */
.stat{background:var(--card2);border-radius:10px;padding:14px 16px}
.stat-v{font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.stat-l{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.stat-s{font-size:11px;color:var(--t2);margin-top:2px}

/* ── DIGITAL STATUS ── */
.dig-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)}
.dig-row:last-child{border-bottom:none}
.dig-plat{font-size:12px;font-weight:600;color:var(--t2);min-width:90px}
.dig-status{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.dig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dig-url{font-size:11px;color:var(--t3);margin-left:auto}
.dig-badge{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:var(--t3);margin-left:6px}

/* ── FIN ROW ── */
.fin-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fin-row:last-child{border-bottom:none}
.fin-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:28px}
.fin-lbl{flex:1;font-size:13px;color:var(--t2)}
.fin-cur{font-size:12px;color:var(--t3)}

/* ── SAT OVERRIDE BTNS ── */
.sat-btn{
  padding:4px 10px;border-radius:15px;
  border:1px solid var(--b);background:transparent;
  cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;
  transition:all .14s;
}
.sat-btn:hover{background:rgba(255,255,255,.06)}
.sat-btn.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3)}

/* ── FIN IMPACT BADGE ── */
.impact{
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:2px 8px;border-radius:5px;display:inline-block;
}
</style>
</head>
<body>
<div id="app">

<!-- ══ TOPBAR ══ -->
<div id="top">
  <div class="top-brand" id="top-brand">
    <div class="t-mark" id="t-mark">⚡</div>
    <div id="t-txt">
      <div class="t-name">MRC OS</div>
      <div class="t-ver">v11 · 2025</div>
    </div>
  </div>
  <div class="top-ctx" id="top-ctx">
    <div class="ctx-dot" id="ctx-dot"></div>
    <span class="ctx-lbl" id="ctx-lbl">Central</span>
  </div>
  <div class="top-mid">
    <input id="top-obj" class="top-obj" placeholder="✦ Foco do dia..."/>
    <div id="t-alert-wrap"></div>
    <div id="t-timer-wrap" style="display:none" class="t-timer-pill">
      <div class="blink" style="width:6px;height:6px;border-radius:50%;background:#EF4444;flex-shrink:0"></div>
      <span class="mono" style="font-size:13px;font-weight:700;color:#EF4444" id="tmr-top">00:00</span>
      <span id="tmr-top-lbl" style="font-size:11px;color:var(--t3);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button onclick="timerStop()" style="background:none;border:none;color:#EF4444;cursor:pointer;font-size:11px;padding:0 0 0 4px;opacity:.7">⏹</button>
    </div>
  </div>
  <div class="top-right">
    <div class="t-xp" id="t-xp">⚡ 0 XP</div>
    <div class="t-clock">
      <div style="display:flex;align-items:baseline;gap:2px">
        <span class="t-hm" id="t-hm">--:--</span>
        <span class="t-sec" id="t-sec">:--</span>
      </div>
      <div class="t-date" id="t-date"></div>
    </div>
  </div>
</div>

<!-- ══ BODY ══ -->
<div id="body">

<!-- SIDEBAR -->
<div id="side">
  <div class="nav-sc" id="nav-sc">
    <button class="ni on" data-p="home" onclick="go('home')"><span class="ni-ico">⚡</span><span class="ni-lbl">Central</span></button>
    <div class="ns" id="ns1">Meus Negócios</div>
    <button class="ni" data-p="nextlevel"   onclick="go('nextlevel')"  ><span class="ni-ico">🟡</span><span class="ni-lbl">NextLevel</span>     <span class="ni-dot"></span><span class="ni-tag" id="nb-nl" style="color:#E8A820">3</span></button>
    <button class="ni" data-p="brasdigital" onclick="go('brasdigital')"><span class="ni-ico">🟠</span><span class="ni-lbl">Brás Digital</span> <span class="ni-tag" id="nb-bd">base</span></button>

═══════════════════════════════════════════════════ */
let pg='home',T=TH.home,sCol=false;
let st={deliveries:{},extras:{},satOvr:{},taskDone:{},fin:{ao:689,vt:3000,vt_pct:0,cusi:0,outros:0},xp:0,obj:'',posts:[],videos:[],adsCampaigns:[],_sBrand:'Todos',_vBrand:'Todos',_adsPl:'Todos'};

try{const d=localStorage.getItem('mrc11');if(d)st={...st,...JSON.parse(d)};}catch(e){}
Object.values(CLIENTS).forEach(c=>{if(!st.extras[c.id])st.extras[c.id]=[...c.initExtras];});

function save(){try{localStorage.setItem('mrc11',JSON.stringify(st));}catch(e){}}

/* ── UTILS ── */
const fT=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${h}:${z(m)}:${z(sc)}`:`${z(m)}:${z(sc)}`;};
const z=n=>String(n).padStart(2,'0');
const brl=v=>'R$ '+Number(v||0).toLocaleString('pt-BR');
const grt=()=>{const h=new Date().getHours();return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';};
const satC=v=>v>=80?'#16A854':v>=60?'#E8A820':'#EF4444';
const satL=v=>v>=80?'Saudável':v>=60?'Atenção':'Crítico';
const priC=p=>p==='critical'?'#EF4444':p==='high'?'#E8A820':'rgba(255,255,255,.3)';
const isUrg=d=>['Esta semana','Urgente','1 semana'].includes(d);
const LEVELS=[{n:'Fundador Solo',max:500},{n:'Estrategista',max:1200},{n:'Builder',max:2500},{n:'Visionário',max:5000},{n:'Lendário',max:Infinity}];
const lvl=()=>LEVELS.find(l=>st.xp<l.max)||LEVELS[LEVELS.length-1];
const MOT=MOTD[Math.floor(Date.now()/5000)%MOTD.length];

function sat(cid){
  if(st.satOvr[cid]!==undefined)return st.satOvr[cid];
  const c=CLIENTS[cid],sv=st.deliveries[cid]||{};
  const done=c.deliveries.filter(d=>(sv[d.id]!==undefined?sv[d.id]:d.done)).length;
  return Math.round((done/Math.max(c.deliveries.length,1))*100);
}
function urgCount(){
  let n=0;Object.values(CLIENTS).forEach(c=>{
    const sv=st.deliveries[c.id]||{};
    c.deliveries.forEach(d=>{if(!(sv[d.id]!==undefined?sv[d.id]:d.done)&&isUrg(d.due))n++;});
  });return n;
}

/* ── THEME ── */
function applyT(key){
  T=TH[key]||TH.home;
  const r=document.documentElement;
  r.style.setProperty('--a',T.a);
  r.style.setProperty('--ar',T.r);
  r.style.setProperty('--bg',T.bg);
  r.style.setProperty('--surf',T.s);
  r.style.setProperty('--card',T.c);
  r.style.setProperty('--card2',T.c2);
  document.body.style.background=T.bg;
  const top=document.getElementById('top'),side=document.getElementById('side');
  if(top){top.style.background=T.s;top.style.borderBottomColor=`rgba(${T.r},.15)`;}
  if(side){side.style.background=T.s;side.style.borderRightColor=`rgba(${T.r},.12)`;}
  const ctx=document.getElementById('top-ctx');
  if(ctx){ctx.style.borderRightColor=`rgba(${T.r},.12)`;}
  const dot=document.getElementById('ctx-dot'),lbl=document.getElementById('ctx-lbl');
  if(dot){dot.style.background=T.a;dot.style.boxShadow=`0 0 10px ${T.a}`;}
  if(lbl){lbl.textContent=T.lbl;lbl.style.color=T.a;}
  const mark=document.getElementById('t-mark');
  if(mark)mark.style.background=`linear-gradient(135deg,${T.a},rgba(${T.r},.3))`;
  const xpb=document.getElementById('s-xp-bar');
  if(xpb)xpb.style.background=T.a;
}

/* ── NAV ── */
function go(p){
  pg=p;
  document.querySelectorAll('.ni').forEach(b=>{
    const on=b.dataset.p===p;
    b.classList.toggle('on',on);
    const th=TH[p]||TH.home;
    b.style.background=on?`rgba(${th.r},.1)`:'';
    b.style.color=on?th.a:'';
  });
  applyT(p);updateTop();render();
}

function colSide(){
  sCol=!sCol;
  const s=document.getElementById('side');
  s.classList.toggle('col',sCol);
  const tb=document.getElementById('top-brand');
  if(tb)tb.classList.toggle('col',sCol);
  const hide=sCol?'none':'';
  document.querySelectorAll('.ni-lbl,.ni-tag,.ns,.ni-dot').forEach(el=>el.style.display=hide);
  document.getElementById('t-txt').style.display=hide;
  document.getElementById('s-xp-wrap').style.display=hide;
  document.getElementById('col-lbl').style.display=hide;
  ['ns1','ns2','ns3'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display=hide;});

/* ── CLOCK ── */
setInterval(()=>{
  const n=new Date();
  const hm=document.getElementById('t-hm'),sec=document.getElementById('t-sec'),dt=document.getElementById('t-date');
  if(hm)hm.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(sec)sec.textContent=':'+z(n.getSeconds());
  if(dt)dt.textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
},1000);

/* ── TOPBAR UPDATE ── */
function updateTop(){
  const uc=urgCount();
  const al=document.getElementById('t-alert-wrap');
  if(al)al.innerHTML=uc?`<button class="t-alert-btn blink" onclick="go('alphaoutfit')">● ${uc} entrega${uc>1?'s':''} urgente${uc>1?'s':''}</button>`:'';
  document.getElementById('t-xp').textContent='⚡ '+st.xp+' XP';
  const L=lvl();
  const prev=LEVELS[LEVELS.indexOf(L)-1];const min=prev?prev.max:0;
  const pct=L.max===Infinity?100:Math.round((st.xp-min)/(L.max-min)*100);
  const xb=document.getElementById('s-xp-bar'),xl=document.getElementById('s-lvl'),xt=document.getElementById('s-xp-txt');
  if(xb)xb.style.width=pct+'%';
  if(xl)xl.textContent=L.n;
  if(xt)xt.textContent=st.xp+' XP';
  const tw=document.getElementById('t-timer-wrap');
  if(tw)tw.style.display=tmrRunning?'flex':'none';
  const tb=document.getElementById('nb-tmr');
  if(tb)tb.style.display=tmrRunning?'':'none';
  [['ao','alphaoutfit'],['vt','viitss'],['cm','cusimodas']].forEach(([k,id])=>{
    const el=document.getElementById('nb-'+k);const v=sat(id);
    if(el){el.textContent=v+'%';el.style.color=satC(v);}
  });
  const obj=document.getElementById('top-obj');
  if(obj&&!obj.value&&st.obj)obj.value=st.obj;
  obj&&obj.addEventListener('input',()=>{st.obj=obj.value;save();},{once:true});
}

/* ── TIMER ── */
let tmrSecs=0,tmrRunning=false,tmrLabel='',tmrIv=null;
function tmrTick(){
  tmrSecs++;
  const d=document.getElementById('tmr-top');if(d)d.textContent=fT(tmrSecs);
  const d2=document.getElementById('timer-disp');if(d2)d2.textContent=fT(tmrSecs);
}
function tmrStart(lbl=''){
  tmrLabel=lbl||tmrLabel;tmrRunning=true;
  if(tmrIv)clearInterval(tmrIv);tmrIv=setInterval(tmrTick,1000);
  const tl=document.getElementById('tmr-top-lbl');if(tl)tl.textContent=tmrLabel;
  updateTop();
}
function tmrPause(){tmrRunning=false;clearInterval(tmrIv);updateTop();}
function timerStop(){tmrPause();tmrSecs=0;if(pg==='timer')render();updateTop();}

/* ── RENDER ── */
function render(){
  const m=document.getElementById('main');if(!m)return;
  if(pg==='home'){renderHome(m);return;}
  if(pg==='timer'){renderTimer(m);return;}
  if(pg==='config'){renderConfig(m);return;}
  if(pg==='amazoniaplat'){renderAmazonIA(m);return;}
  if(pg==='idesapg'){renderIDESA(m);return;}
  if(pg==='entidades'){renderEntidades(m);return;}
  if(pg==='social'){renderSocial(m);return;}
  if(pg==='videos'){renderVideos(m);return;}
  if(pg==='ads'){renderAds(m);return;}
  if(CLIENTS[pg]){renderClient(m,pg);return;}
  if(BIZ[pg]){renderBiz(m,pg);return;}
  renderHome(m);
}

function renderDeliveries(id){
  const c=CLIENTS[id];const th=TH[c.theme]||TH.home;
  const sv=st.deliveries[id]||{};
  const el=document.getElementById('del-'+id);if(!el)return;
  el.innerHTML=c.deliveries.map(d=>{
    const isDone=sv[d.id]!==undefined?sv[d.id]:d.done;
    const urg=!isDone&&isUrg(d.due);
    return`<div class="del-row">
      <div class="chk${isDone?' on':''}" style="background:${isDone?th.a:'transparent'};border-color:${isDone?th.a:'rgba(255,255,255,.2)'}"
        onclick="togDel('${id}','${d.id}')">${isDone?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;text-decoration:${isDone?'line-through':'none'};color:${isDone?'var(--t3)':'var(--t1)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.t}</div>
        <div class="dimx" style="margin-top:1px">${d.freq} · ${d.due}</div>
      </div>
      ${urg?'<span class="urg-tag">urgente</span>':isDone?'<span class="ok-tag">✓ ok</span>':''}
    </div>`;
  }).join('');
  const doneN=c.deliveries.filter(d=>(sv[d.id]!==undefined?sv[d.id]:d.done)).length;
  const bar=document.getElementById('del-bar-'+id),cnt=document.getElementById('del-cnt-'+id);
  if(bar)bar.style.width=Math.round(doneN/c.deliveries.length*100)+'%';
  if(cnt)cnt.textContent=doneN+'/'+c.deliveries.length+' entregas em dia';
}

function renderExtras(id){
  const el=document.getElementById('ext-'+id);if(!el)return;
  const list=st.extras[id]||[];
  if(!list.length){el.innerHTML=`<div class="dimx" style="text-align:center;padding:16px 0">Nenhuma demanda extra cadastrada</div>`;return;}
  const th=TH[CLIENTS[id]?.theme]||TH.home;
  el.innerHTML=list.map(e=>`<div class="extra-item" style="opacity:${e.done?.38:1}">
    <div class="chk${e.done?' on':''}" style="background:${e.done?th.a:'transparent'};border-color:${e.done?th.a:priC(e.priority)};margin-top:1px"
      onclick="togExtra('${id}','${e.id}')">${e.done?'✓':''}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;text-decoration:${e.done?'line-through':'none'};line-height:1.35">${e.t}</div>
      <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center">
        ${e.deadline?`<span class="dimx">📅 ${e.deadline}</span>`:''}
        <span style="font-size:10px;font-weight:700;color:${priC(e.priority)}">${e.priority}</span>
      </div>
    </div>
  </div>`).join('');
}

function togDel(id,did){
  if(!st.deliveries[id])st.deliveries[id]={};
  const c=CLIENTS[id];const d=c.deliveries.find(x=>x.id===did);
  const was=st.deliveries[id][did]!==undefined?st.deliveries[id][did]:d.done;
  st.deliveries[id][did]=!was;
  st.xp+=was?-10:10;st.xp=Math.max(0,st.xp);
  save();renderDeliveries(id);updateTop();
}
function togExtra(id,eid){
  st.extras[id]=(st.extras[id]||[]).map(e=>e.id===eid?{...e,done:!e.done}:e);
  save();renderExtras(id);
}
function toggleForm(id){const el=document.getElementById('form-'+id);if(el)el.style.display=el.style.display==='block'?'none':'block';}
function addExtra(id){
  const t=document.getElementById('et-'+id)?.value.trim();if(!t)return;
  const dl=document.getElementById('edl-'+id)?.value||'';
  const pr=document.getElementById('epr-'+id)?.value||'normal';
  if(!st.extras[id])st.extras[id]=[];
  st.extras[id].push({id:id+'-e'+Date.now(),t,deadline:dl,priority:pr,done:false});
  save();toggleForm(id);renderExtras(id);
}
function setSat(id,v){
  st.satOvr[id]=v;save();
  renderClient(document.getElementById('main'),id);updateTop();
}

function tgTask(tid,xp,pg_){
  st.taskDone[tid]=!st.taskDone[tid];
  st.xp+=st.taskDone[tid]?xp:-xp;
  st.xp=Math.max(0,st.xp);
  save();updateTop();
  if(pg_==='az')renderAmazonIA(document.getElementById('main'));
  else renderIDESA(document.getElementById('main'));
}

function togglePh(hdr,contentId){
  const c=document.getElementById(contentId);if(!c)return;
  const open=c.style.display==='block';
  c.style.display=open?'none':'block';
  const arr=hdr.querySelector('.phArr');
  if(arr)arr.textContent=open?'▼':'▲';
}

  save();renderSocial(document.getElementById('main'));
}

function openEditPost(pid){openPostModal(pid);}
function savePost(pid){
  const brand=document.getElementById('pB')?.value||'NextLevel';
  const title=document.getElementById('pT')?.value||'';if(!title.trim())return;
  const plat=document.getElementById('pP')?.value||'Instagram';
  const status=document.getElementById('pS')?.value||'Ideia';
  const date=document.getElementById('pD')?.value||new Date().toISOString().slice(0,10);
  if(pid){const p=st.posts.find(x=>x.id===pid);if(p){p.brand=brand;p.title=title;p.plat=plat;p.status=status;p.date=date;}}
  else{st.posts.push({id:'p'+Date.now(),brand,title,plat,status,date,checks:{roteiro:false,gravado:false,editado:false,thumb:false,legenda:false,publicado:false}});}
  save();document.querySelector('[style*="position:fixed"]')?.remove();renderSocial(document.getElementById('main'));
}
function deletePost(pid){if(!confirm('Excluir post?'))return;st.posts=st.posts.filter(x=>x.id!==pid);save();document.querySelector('[style*="position:fixed"]')?.remove();renderSocial(document.getElementById('main'));}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">

        <div><div class="lbl">Prioridade</div><select class="inp" id="vPr"><option value="normal" ${v&&v.priority!=='high'?'selected':''}>Normal</option><option value="high" ${v&&v.priority==='high'?'selected':''}>Alta</option></select></div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="saveVideo('${v?v.id:''}')" style="flex:1;padding:9px;border-radius:var(--rs);border:none;background:${T.a};color:#07070D;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer">Salvar</button>
        ${v?`<button onclick="deleteVideo('${v.id}')" style="padding:9px 14px;border-radius:var(--rs);border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#EF4444;font-family:inherit;font-weight:600;font-size:12px;cursor:pointer">Excluir</button>`:''}
        <button onclick="this.closest('[style*=fixed]').remove()" style="padding:9px 14px;border-radius:var(--rs);border:1px solid var(--b);background:transparent;color:var(--t2);font-family:inherit;font-weight:600;font-size:12px;cursor:pointer">Cancelar</button>
      </div>
    </div>
  </div>`;
}
function openEditVideoModal(vid){openVideoModal(vid);}
function saveVideo(vid){
  const brand=document.getElementById('vB')?.value||'NextLevel';
  const title=document.getElementById('vT')?.value||'';if(!title.trim())return;
  const briefing=document.getElementById('vBf')?.value||'';
  const plat=document.getElementById('vPl')?.value||'TikTok';
  const status=document.getElementById('vSt')?.value||'Ideia';
  const duration=document.getElementById('vDu')?.value||'60s';
  const priority=document.getElementById('vPr')?.value||'normal';
  if(vid){const v=st.videos.find(x=>x.id===vid);if(v){v.brand=brand;v.title=title;v.briefing=briefing;v.plat=plat;v.status=status;v.duration=duration;v.priority=priority;}}
  else{st.videos.push({id:'v'+Date.now(),brand,title,briefing,plat,status,duration,priority,checks:{corte:false,legenda:false,thumb:false,dubagemEN:false,publicado:false}});}
  save();document.querySelector('[style*="position:fixed"]')?.remove();renderVideos(document.getElementById('main'));
}
function deleteVideo(vid){if(!confirm('Excluir vídeo?'))return;st.videos=st.videos.filter(x=>x.id!==vid);save();document.querySelector('[style*="position:fixed"]')?.remove();renderVideos(document.getElementById('main'));}

/* ═══════════════════════════════════════════════════
   GESTÃO DE ADS
═══════════════════════════════════════════════════ */
const ADS_STATUS=['Proposta','Planejada','Ativa','Pausada','Encerrada'];
const ADS_STATUS_CLR={'Ativa':'#16A854','Pausada':'#E8A820','Proposta':'#3B82F6','Planejada':'#A855F7','Encerrada':'#6B7280'};
function renderAds(el){
  if(!st._adsPl)st._adsPl='Todos';
  const plats=['Todos',...ADS_PLATS];
  const filt=st.adsCampaigns.filter(a=>st._adsPl==='Todos'||a.plat===st._adsPl);
  const totalSpend=st.adsCampaigns.reduce((a,c)=>a+(+c.spend||0),0);
  const ativas=st.adsCampaigns.filter(a=>a.status==='Ativa').length;
  const plano=st.adsCampaigns.filter(a=>['Proposta','Planejada'].includes(a.status)).length;
  const PLAT_CLR={'Meta Ads':'#1877F2','Google Ads':'#EA4335','TikTok Ads':'#010101'};
  let h=`<div class="pw fade">
  <div class="ph" style="margin-bottom:4px">📣 Gestão de Ads</div>
  <div class="psub" style="margin-bottom:14px">Status por plataforma, budget vs gasto, resultados editáveis e checklist semanal</div>

  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    <div style="background:var(--card2);border-radius:9px;padding:13px"><div style="font-size:22px;font-weight:800;color:#16A854;font-family:'JetBrains Mono',monospace">${ativas}</div><div style="font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Campanhas Ativas</div></div>
    <div style="background:var(--card2);border-radius:9px;padding:13px"><div style="font-size:22px;font-weight:800;color:#EF4444;font-family:'JetBrains Mono',monospace">R$${totalSpend.toLocaleString('pt-BR')}</div><div style="font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Gasto Total Mês</div></div>
    <div style="background:var(--card2);border-radius:9px;padding:13px"><div style="font-size:22px;font-weight:800;color:#3B82F6;font-family:'JetBrains Mono',monospace">${plano}</div><div style="font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em">Em Planejamento</div></div>
  </div>

  <div style="display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap">
    ${plats.map(p=>{const c=PLAT_CLR[p]||T.a;return`<button onclick="st._adsPl='${p}';save();renderAds(document.getElementById('main'))" style="font-size:11px;padding:4px 12px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-weight:600;background:${st._adsPl===p?c:'rgba(255,255,255,.07)'};color:${st._adsPl===p?'#fff':'var(--t2)'}">${p==='Todos'?'Todas':p}</button>`;}).join('')}
    <button onclick="openAdModal()" style="font-size:11px;padding:4px 12px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-weight:700;background:${T.a};color:#07070D;margin-left:auto">+ Campanha</button>
  </div>

  <div class="card" style="margin-bottom:14px;overflow-x:auto">
    <div class="lbl lbla" style="margin-bottom:12px">Campanhas</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);padding:7px 9px;text-align:left;border-bottom:1px solid var(--b)">Cliente</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:left;border-bottom:1px solid var(--b)">Plataforma</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:left;border-bottom:1px solid var(--b)">Objetivo</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:left;border-bottom:1px solid var(--b)">Status</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:right;border-bottom:1px solid var(--b)">Budget</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:right;border-bottom:1px solid var(--b)">Gasto</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:right;border-bottom:1px solid var(--b)">CTR%</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:right;border-bottom:1px solid var(--b)">CPL</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:right;border-bottom:1px solid var(--b)">Conv.</th>
        <th style="font-size:9px;font-weight:700;color:var(--t3);padding:7px 9px;text-align:center;border-bottom:1px solid var(--b)">Ação</th>
      </tr></thead>
      <tbody>
        ${filt.map(a=>{
          const sc=ADS_STATUS_CLR[a.status]||'#6B7280';
          const bpct=a.budget>0?Math.round((a.spend/a.budget)*100):0;
          const pc=PLAT_CLR[a.plat]||'#888';
          return `<tr style="border-bottom:1px solid rgba(255,255,255,.04)">
            <td style="padding:9px;font-size:12px;font-weight:600">${a.client}</td>
            <td style="padding:9px"><span style="font-size:9px;padding:2px 7px;border-radius:5px;background:${pc}22;color:${pc};font-weight:700">${a.plat}</span></td>
            <td style="padding:9px;font-size:11px;color:var(--t2)">${a.goal}</td>
            <td style="padding:9px"><span style="font-size:9px;padding:2px 7px;border-radius:5px;background:${sc}18;color:${sc};font-weight:700;cursor:pointer" onclick="cycleAdStatus('${a.id}')" title="Clique para avançar status">${a.status} ↻</span></td>
            <td style="padding:9px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px">R$${(a.budget||0).toLocaleString('pt-BR')}</td>
            <td style="padding:9px;text-align:right"><input style="background:transparent;border:none;color:${bpct>90?'#EF4444':bpct>70?'#E8A820':'var(--t1)'};font-family:'JetBrains Mono',monospace;font-size:12px;width:68px;outline:none;text-align:right" type="number" value="${a.spend||0}" onchange="updAd('${a.id}','spend',this.value)" onfocus="this.style.background='rgba(255,255,255,.05)'"></td>
            <td style="padding:9px;text-align:right"><input style="background:transparent;border:none;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;width:52px;outline:none;text-align:right" type="number" step="0.1" value="${a.ctr||0}" onchange="updAd('${a.id}','ctr',this.value)"></td>
            <td style="padding:9px;text-align:right"><input style="background:transparent;border:none;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;width:60px;outline:none;text-align:right" type="number" value="${a.cpl||0}" onchange="updAd('${a.id}','cpl',this.value)"></td>
            <td style="padding:9px;text-align:right"><input style="background:transparent;border:none;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;width:52px;outline:none;text-align:right" type="number" value="${a.conv||0}" onchange="updAd('${a.id}','conv',this.value)"></td>
            <td style="padding:9px;text-align:center"><button onclick="delAd('${a.id}')" style="font-size:10px;padding:3px 8px;border-radius:5px;border:1px solid rgba(239,68,68,.2);background:rgba(239,68,68,.08);color:#EF4444;cursor:pointer;font-family:inherit">✕</button></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="lbl lbla" style="margin-bottom:12px">✅ Checklist Semanal de Ads</div>
    ${filt.filter(a=>['Ativa','Planejada'].includes(a.status)).map(a=>{
      const checks=a.checks||{};
      const steps=[['criativo','🎨 Criar criativo'],['campanha','🚀 Subir campanha'],['relatorio','📊 Relatório'],['otimizacao','⚡ Otimizar']];
      const dn=steps.filter(([s])=>checks[s]).length;
      const pct2=Math.round(dn/steps.length*100);
      return `<div style="background:var(--card2);border:1px solid var(--b);border-radius:var(--rs);padding:10px 12px;margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
          <div style="font-size:12px;font-weight:600">${a.client} <span style="color:var(--t3);font-weight:400">— ${a.plat} — ${a.goal}</span></div>
          <span style="font-size:11px;font-weight:700;color:${pct2===100?'#16A854':'var(--t3)'}">${pct2}%</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${steps.map(([s,l])=>`<button onclick="tgAdCheck('${a.id}','${s}')" style="font-size:10px;padding:3px 9px;border-radius:14px;border:1px solid ${checks[s]?'#16A854':'var(--b)'};background:${checks[s]?'rgba(22,168,84,.12)':'transparent'};color:${checks[s]?'#16A854':'var(--t3)'};cursor:pointer;font-family:inherit;font-weight:600">${l}</button>`).join('')}
        </div>
      </div>`;
    }).join('')||`<div class="dimx" style="text-align:center;padding:14px">Nenhuma campanha ativa ou planejada</div>`}
  </div>
  <div id="ad-modal-wrap"></div>
  </div>`;
  el.innerHTML=h;
}
function updAd(aid,field,val){const a=st.adsCampaigns.find(x=>x.id===aid);if(a){a[field]=parseFloat(val)||0;save();}}
function cycleAdStatus(aid){const a=st.adsCampaigns.find(x=>x.id===aid);if(!a)return;const i=ADS_STATUS.indexOf(a.status);a.status=ADS_STATUS[(i+1)%ADS_STATUS.length];save();renderAds(document.getElementById('main'));}
function delAd(aid){if(!confirm('Excluir campanha?'))return;st.adsCampaigns=st.adsCampaigns.filter(x=>x.id!==aid);save();renderAds(document.getElementById('main'));}
function tgAdCheck(aid,step){const a=st.adsCampaigns.find(x=>x.id===aid);if(!a)return;if(!a.checks)a.checks={};a.checks[step]=!a.checks[step];save();renderAds(document.getElementById('main'));}
function openAdModal(){
  const wrap=document.getElementById('ad-modal-wrap');if(!wrap)return;
  wrap.innerHTML=`<div style="position:fixed;inset:0;background:rgba(7,7,13,.88);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px" onclick="this.remove()">
    <div style="background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:var(--r);padding:22px;width:100%;max-width:420px" onclick="event.stopPropagation()">
      <div style="font-size:14px;font-weight:800;margin-bottom:16px">+ Nova Campanha</div>
      <div style="margin-bottom:10px"><div class="lbl">Cliente</div><select class="inp" id="aClient">${ADS_CLIENTS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div><div class="lbl">Plataforma</div><select class="inp" id="aPlat">${ADS_PLATS.map(p=>`<option>${p}</option>`).join('')}</select></div>
        <div><div class="lbl">Status</div><select class="inp" id="aStatus"><option>Proposta</option><option>Planejada</option><option>Ativa</option></select></div>
      </div>
      <div style="margin-bottom:10px"><div class="lbl">Objetivo da Campanha</div><input class="inp" id="aGoal" placeholder="ex: Leads WhatsApp, Vendas TikTok..."></div>
      <div style="margin-bottom:14px"><div class="lbl">Budget Mensal (R$)</div><input class="inp" type="number" id="aBudget" placeholder="0"></div>
      <div style="display:flex;gap:8px">
        <button onclick="saveAd()" style="flex:1;padding:9px;border-radius:var(--rs);border:none;background:${T.a};color:#07070D;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer">Salvar</button>
        <button onclick="this.closest('[style*=fixed]').remove()" style="padding:9px 14px;border-radius:var(--rs);border:1px solid var(--b);background:transparent;color:var(--t2);font-family:inherit;font-weight:600;font-size:12px;cursor:pointer">Cancelar</button>
      </div>
    </div>
  </div>`;
}
function saveAd(){
  const client=document.getElementById('aClient')?.value||'Alpha Outfit';
  const plat=document.getElementById('aPlat')?.value||'Meta Ads';
  const status=document.getElementById('aStatus')?.value||'Proposta';
  const goal=document.getElementById('aGoal')?.value||'';
  const budget=parseFloat(document.getElementById('aBudget')?.value||0)||0;
  st.adsCampaigns.push({id:'ad'+Date.now(),client,plat,status,goal,budget,spend:0,ctr:0,cpl:0,conv:0,checks:{criativo:false,campanha:false,relatorio:false,otimizacao:false}});
  save();document.querySelector('[style*="position:fixed"]')?.remove();renderAds(document.getElementById('main'));
}

</script>
</body>
</html>
