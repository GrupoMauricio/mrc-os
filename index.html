<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MRC OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}

/* ── DESIGN TOKENS ── */
:root{
  --a:#7C3AED;--ar:124,58,237;
  --bg:#07070D;--surf:#0C0C14;--card:#111120;--card2:#161626;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --t1:#F0EDF8;--t2:rgba(240,237,248,.6);--t3:rgba(240,237,248,.28);
  --r:14px;--rs:9px;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}

/* ── KEYFRAMES ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes glow-in{from{box-shadow:0 0 0 0 var(--a)}to{box-shadow:0 0 16px 0 rgba(var(--ar),.3)}}
.fade{animation:fadeUp .2s ease both}
.blink{animation:pulse 1.3s ease-in-out infinite}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;background:var(--bg);color:var(--t1)}

/* ── TOPBAR ── */
#top{
  height:52px;display:flex;align-items:center;gap:0;
  padding:0;flex-shrink:0;
  background:var(--surf);
  border-bottom:1px solid var(--b);
  transition:border-color .35s,background .35s;
  position:relative;z-index:10;
}
.top-brand{
  width:220px;min-width:220px;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
  border-right:1px solid var(--b);
  height:100%;flex-shrink:0;
  transition:width .25s,min-width .25s;
}
.top-brand.col{width:56px;min-width:56px;}
.t-mark{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  background:linear-gradient(135deg,var(--a),#4C1D95);
  box-shadow:0 2px 8px rgba(var(--ar),.4);
}
.t-name{font-size:13px;font-weight:800;white-space:nowrap;color:var(--t1)}
.t-ver{font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.top-ctx{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;
  border-right:1px solid var(--b);
  height:100%;
}
.ctx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .35s,box-shadow .35s}
.ctx-lbl{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;transition:color .35s}
.top-mid{flex:1;display:flex;align-items:center;padding:0 20px;gap:12px}
.top-obj{
  flex:1;max-width:380px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--b);border-radius:8px;
  color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;
  padding:6px 12px;outline:none;transition:border-color .15s,background .15s;
}
.top-obj:focus{border-color:rgba(var(--ar),.5);background:rgba(255,255,255,.06)}
.top-obj::placeholder{color:var(--t3);font-weight:400}
.top-right{display:flex;align-items:center;gap:8px;padding:0 20px;flex-shrink:0}
.t-alert-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  color:#EF4444;font-size:11px;font-weight:700;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.t-alert-btn:hover{background:rgba(239,68,68,.14)}
.t-timer-pill{
  display:flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:20px;
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
}
.t-xp{
  background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.18);
  border-radius:20px;padding:5px 11px;
  font-size:11px;font-weight:700;color:#A855F7;
  font-family:'JetBrains Mono',monospace;white-space:nowrap;
}
.t-clock{
  background:var(--card);border:1px solid var(--b);
  border-radius:9px;padding:5px 13px;
}
.t-hm{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;line-height:1;color:var(--t1)}
.t-sec{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3)}
.t-date{font-size:9px;color:var(--t3);text-transform:capitalize;margin-top:1px}

/* ── BODY ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#side{
  width:220px;min-width:220px;
  display:flex;flex-direction:column;
  border-right:1px solid var(--b);
  background:var(--surf);
  transition:width .25s,min-width .25s;
  flex-shrink:0;overflow:hidden;
}
#side.col{width:56px;min-width:56px}
.nav-sc{flex:1;overflow-y:auto;padding:10px 7px;display:flex;flex-direction:column;gap:1px}
.ns{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--t3);padding:12px 8px 5px;white-space:nowrap;overflow:hidden;
}
.ni{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;
  color:var(--t3);width:100%;text-align:left;
  transition:background .12s,color .12s;
  white-space:nowrap;overflow:hidden;
  font-family:inherit;font-size:12px;font-weight:500;
}
.ni:hover{background:rgba(255,255,255,.05);color:var(--t2)}
.ni.on{background:rgba(var(--ar),.1);color:var(--a)}
.ni-ico{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni-lbl{flex:1;font-size:12px}
.ni-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.07);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.ni-dot{width:5px;height:5px;border-radius:50%;background:#EF4444;flex-shrink:0;box-shadow:0 0 4px #EF4444}
.s-foot{padding:8px 7px;border-top:1px solid var(--b);flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.s-xp-wrap{padding:6px 8px 8px;overflow:hidden}
.s-lvl{font-size:9px;font-weight:700;color:var(--a);margin-bottom:5px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.col-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:var(--rs);
  cursor:pointer;border:none;background:transparent;
  color:var(--t3);width:100%;font-family:inherit;font-size:12px;
  transition:all .12s;
}
.col-btn:hover{background:rgba(255,255,255,.05);color:var(--t2)}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden}
.pw{padding:28px 32px;width:100%;max-width:1400px;margin:0 auto}

/* ── TYPOGRAPHY ── */
.pg-h{font-size:24px;font-weight:800;line-height:1.1;color:var(--t1)}
.pg-sub{font-size:13px;color:var(--t2);margin-top:3px}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.sec-lbl-a{color:var(--a)}
.dim{color:var(--t2);font-size:13px}
.dimx{color:var(--t3);font-size:11px}
.mono{font-family:'JetBrains Mono',monospace}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.gauto{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.gauto-lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:20px;transition:border-color .2s}
.card-s{padding:16px}
.card-xs{padding:12px 14px}
.card-hover:hover{border-color:var(--b2);transform:translateY(-1px);transition:all .18s}
.card-accent{border-left:3px solid var(--a)!important}
.card-glow{box-shadow:0 0 0 1px rgba(var(--ar),.2),0 4px 24px rgba(var(--ar),.08)}

/* ── BAR ── */
.bar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden}
.bar-md{height:6px}
.bar-lg{height:8px}
.bar-f{height:100%;border-radius:99px;transition:width .55s ease}

/* ── INPUT ── */
.inp{
  background:rgba(255,255,255,.05);border:1px solid var(--b);
  border-radius:var(--rs);color:var(--t1);
  font-family:'DM Sans',sans-serif;font-size:13px;
  padding:8px 11px;outline:none;width:100%;
  transition:border-color .15s,background .15s;
}
.inp:focus{border-color:rgba(var(--ar),.5)}
.inp::placeholder{color:var(--t3)}
select.inp{cursor:pointer}
.fin-inp{
  background:rgba(255,255,255,.04);border:1px solid var(--b);
  border-radius:7px;color:var(--t1);
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;
  padding:6px 10px;width:120px;outline:none;text-align:right;
  transition:border-color .15s;
}
.fin-inp:focus{border-color:rgba(var(--ar),.5)}

/* ── BTN ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;transition:all .15s}
.btn-a{color:#07070D}
.btn-g{background:rgba(255,255,255,.07);color:var(--t2)}
.btn-g:hover{background:rgba(255,255,255,.12);color:var(--t1)}
.btn-sm{padding:5px 11px;font-size:11px}
.btn-danger{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2)}

/* ── NEXT ACTION HERO ── */
.hero-action{
  background:linear-gradient(135deg,rgba(var(--ar),.1),rgba(var(--ar),.04));
  border:1px solid rgba(var(--ar),.2);
  border-radius:var(--r);padding:18px 22px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.hero-action::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(var(--ar),.4),transparent);
}

/* ── BIZ CARD (home) ── */
.biz-card{
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);padding:18px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.biz-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:var(--bc,rgba(255,255,255,.15));
  transition:opacity .2s;
}
.biz-card:hover{border-color:var(--b2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.biz-status{font-size:10px;font-weight:700;letter-spacing:.04em}
.biz-pct{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.biz-blocker{
  font-size:11px;color:var(--t3);margin-top:8px;
  padding-top:8px;border-top:1px solid var(--b);
  line-height:1.4;
}
.biz-money{
  font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:3px 8px;border-radius:6px;display:inline-block;
  background:rgba(255,255,255,.05);color:var(--t2);margin-top:4px;
}

/* ── CLIENT HEALTH CARD ── */
.cli-card{
  background:var(--card);border:1px solid var(--b);
  border-radius:var(--r);padding:18px;cursor:pointer;
  transition:all .2s;position:relative;
}
.cli-card:hover{border-color:var(--b2);transform:translateY(-1px)}
.cli-sat{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.cli-urg{
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;
  background:rgba(239,68,68,.1);color:#EF4444;border:1px solid rgba(239,68,68,.2);
  display:inline-block;margin-top:6px;
}

/* ── PIPELINE ── */
.pipe-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.pipe-col{flex:1;min-width:220px}
.pipe-hd{
  padding:9px 13px;border-radius:var(--rs) var(--rs) 0 0;
  border:1px solid var(--b);border-bottom:none;
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(255,255,255,.03);
}
.pipe-body{
  border:1px solid var(--b);border-radius:0 0 var(--rs) var(--rs);
  padding:10px;display:flex;flex-direction:column;gap:7px;
  min-height:100px;background:rgba(255,255,255,.015);
}
.pipe-item{
  background:var(--card);border:1px solid var(--b);
  border-radius:8px;padding:11px 13px;cursor:pointer;
  transition:all .18s;
}
.pipe-item:hover:not(.pi-lock):not(.pi-done){border-color:var(--b2);background:var(--card2)}
.pipe-item.pi-done{opacity:.35;cursor:default}
.pipe-item.pi-lock{opacity:.45;cursor:default}
.pi-name{font-size:12px;font-weight:600;line-height:1.35;color:var(--t1)}
.pi-done .pi-name{text-decoration:line-through;color:var(--t2)}
.pi-impact{font-size:11px;font-weight:600;margin-top:5px}
.pi-req{font-size:10px;color:var(--t3);margin-top:3px;line-height:1.3}
.pi-ico{font-size:13px;margin-bottom:4px}
.pi-money{
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:2px 7px;border-radius:5px;display:inline-block;
  background:rgba(255,255,255,.06);margin-top:5px;
}

/* ── DELIVERY ── */
.del-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b)}
.del-row:last-child{border-bottom:none}
.chk{
  width:18px;height:18px;border-radius:5px;
  border:1.5px solid rgba(255,255,255,.2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:10px;font-weight:800;color:transparent;
  transition:all .18s;user-select:none;
}
.chk.on{color:white}
.urg-tag{
  font-size:9px;padding:2px 7px;border-radius:8px;
  background:rgba(239,68,68,.1);color:#EF4444;
  border:1px solid rgba(239,68,68,.2);font-weight:700;flex-shrink:0;
}
.ok-tag{
  font-size:9px;padding:2px 7px;border-radius:8px;
  background:rgba(22,168,84,.1);color:#16A854;
  border:1px solid rgba(22,168,84,.2);font-weight:700;flex-shrink:0;
}

/* ── EXTRA DEMAND ── */
.extra-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 13px;background:var(--card2);
  border-radius:var(--rs);border:1px solid var(--b);
  margin-bottom:7px;transition:border-color .15s;
}
.extra-item:hover{border-color:var(--b2)}
.add-form{display:none;background:var(--card2);border-radius:var(--rs);padding:14px;margin-bottom:10px;border:1px solid var(--b)}

/* ── STAT BLOCK ── */
.stat{background:var(--card2);border-radius:10px;padding:14px 16px}
.stat-v{font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;font-family:'JetBrains Mono',monospace}
.stat-l{font-size:10px;color:var(--t3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.stat-s{font-size:11px;color:var(--t2);margin-top:2px}

/* ── DIGITAL STATUS ── */
.dig-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)}
.dig-row:last-child{border-bottom:none}
.dig-plat{font-size:12px;font-weight:600;color:var(--t2);min-width:90px}
.dig-status{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.dig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dig-url{font-size:11px;color:var(--t3);margin-left:auto}
.dig-badge{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.06);color:var(--t3);margin-left:6px}

/* ── FIN ROW ── */
.fin-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fin-row:last-child{border-bottom:none}
.fin-bar{width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;min-height:28px}
.fin-lbl{flex:1;font-size:13px;color:var(--t2)}
.fin-cur{font-size:12px;color:var(--t3)}

/* ── SAT OVERRIDE BTNS ── */
.sat-btn{
  padding:4px 10px;border-radius:15px;
  border:1px solid var(--b);background:transparent;
  cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;
  transition:all .14s;
}
.sat-btn:hover{background:rgba(255,255,255,.06)}
.sat-btn.active{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3)}

/* ── FIN IMPACT BADGE ── */
.impact{
  font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;
  padding:2px 8px;border-radius:5px;display:inline-block;
}
</style>
</head>
<body>
<div id="app">

<!-- ══ TOPBAR ══ -->
<div id="top">
  <div class="top-brand" id="top-brand">
    <div class="t-mark" id="t-mark">⚡</div>
    <div id="t-txt">
      <div class="t-name">MRC OS</div>
      <div class="t-ver">v10 · 2025</div>
    </div>
  </div>
  <div class="top-ctx" id="top-ctx">
    <div class="ctx-dot" id="ctx-dot"></div>
    <span class="ctx-lbl" id="ctx-lbl">Central</span>
  </div>
  <div class="top-mid">
    <input id="top-obj" class="top-obj" placeholder="✦ Foco do dia..."/>
    <div id="t-alert-wrap"></div>
    <div id="t-timer-wrap" style="display:none" class="t-timer-pill">
      <div class="blink" style="width:6px;height:6px;border-radius:50%;background:#EF4444;flex-shrink:0"></div>
      <span class="mono" style="font-size:13px;font-weight:700;color:#EF4444" id="tmr-top">00:00</span>
      <span id="tmr-top-lbl" style="font-size:11px;color:var(--t3);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button onclick="timerStop()" style="background:none;border:none;color:#EF4444;cursor:pointer;font-size:11px;padding:0 0 0 4px;opacity:.7">⏹</button>
    </div>
  </div>
  <div class="top-right">
    <div class="t-xp" id="t-xp">⚡ 0 XP</div>
    <div class="t-clock">
      <div style="display:flex;align-items:baseline;gap:2px">
        <span class="t-hm" id="t-hm">--:--</span>
        <span class="t-sec" id="t-sec">:--</span>
      </div>
      <div class="t-date" id="t-date"></div>
    </div>
  </div>
</div>

<!-- ══ BODY ══ -->
<div id="body">

<!-- SIDEBAR -->
<div id="side">
  <div class="nav-sc" id="nav-sc">
    <button class="ni on" data-p="home" onclick="go('home')"><span class="ni-ico">⚡</span><span class="ni-lbl">Central</span></button>
    <div class="ns" id="ns1">Meus Negócios</div>
    <button class="ni" data-p="nextlevel"   onclick="go('nextlevel')"  ><span class="ni-ico">🟡</span><span class="ni-lbl">NextLevel</span>     <span class="ni-dot"></span><span class="ni-tag" id="nb-nl" style="color:#E8A820">3</span></button>
    <button class="ni" data-p="brasdigital" onclick="go('brasdigital')"><span class="ni-ico">🟠</span><span class="ni-lbl">Brás Digital</span> <span class="ni-tag" id="nb-bd">base</span></button>

  const done=c.deliveries.filter(d=>(sv[d.id]!==undefined?sv[d.id]:d.done)).length;
  return Math.round((done/Math.max(c.deliveries.length,1))*100);
}
function urgCount(){
  let n=0;Object.values(CLIENTS).forEach(c=>{
    const sv=st.deliveries[c.id]||{};
    c.deliveries.forEach(d=>{if(!(sv[d.id]!==undefined?sv[d.id]:d.done)&&isUrg(d.due))n++;});
  });return n;
}

  tmrSecs++;

  const d2=document.getElementById('timer-disp');if(d2)d2.textContent=fT(tmrSecs);

function tmrStart(lbl=''){
  tmrLabel=lbl||tmrLabel;tmrRunning=true;

function tmrPause(){tmrRunning=false;clearInterval(tmrIv);updateTop();}

  if(pg==='timer'){renderTimer(m);return;}
  if(pg==='config'){renderConfig(m);return;}
  if(CLIENTS[pg]){renderClient(m,pg);return;}
  if(BIZ[pg]){renderBiz(m,pg);return;}
  renderHome(m);
}

    <div class="sec-lbl" style="color:${th.a};margin-bottom:14px">🚀 Pipeline de Ações</div>
    <div class="pipe-wrap">
      ${Object.entries(b.pipe).map(([col,tks])=>{
        const cc=col==='Fazer agora'?'#EF4444':col==='Em construção'?'#E8A820':'rgba(255,255,255,.3)';
        return`<div class="pipe-col">
          <div class="pipe-hd" style="color:${cc}">${col}</div>
          <div class="pipe-body">
            ${tks.map(t=>{
              const isDone=!!st.taskDone[t.id];
              const isLock=!!t.req&&!st.taskDone[t.req];
              const reqTask=tasks.find(x=>x.id===t.req);
              return`<div class="pipe-item${isDone?' pi-done':isLock?' pi-lock':''}"
                onclick="${!isLock&&!isDone?`bizTask('${id}','${t.id}','${t.t.replace(/'/g,"\\'")}')`:''}"
                style="border-left:3px solid ${isDone?'#16A854':isLock?'rgba(255,255,255,.1)':t.color}">
                <div class="pi-ico">${isDone?'✅':isLock?'🔒':'○'}</div>
                <div class="pi-name">${t.t}</div>
                <div class="pi-impact" style="color:${isDone?'#16A854':isLock?'var(--t3)':t.color}">${t.impact}</div>
                ${t.money?`<span class="pi-money" style="color:${t.color}">${t.money}</span>`:''}
                ${isLock&&reqTask?`<div class="pi-req">Aguarda: ${reqTask.t}</div>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <div class="card">
    <div class="sec-lbl" style="margin-bottom:12px">🌐 Presença Digital</div>
    ${digRows||'<div class="dimx">Nenhuma plataforma mapeada</div>'}
  </div>

  </div>`;
}

function bizTask(bizId,taskId,taskName){
  st.taskDone[taskId]=!st.taskDone[taskId];
  st.xp+=st.taskDone[taskId]?20:-20;
  st.xp=Math.max(0,st.xp);
  save();updateTop();renderBiz(document.getElementById('main'),bizId);
}

/* ═══════════════════════════════════════════════════
   CLIENT PAGE
═══════════════════════════════════════════════════ */
function renderClient(el,id){
  const c=CLIENTS[id];const th=TH[c.theme]||TH.home;
  const v=sat(id);const sc=satC(v);
  const sv=st.deliveries[id]||{};
  const done=c.deliveries.filter(d=>(sv[d.id]!==undefined?sv[d.id]:d.done)).length;

  el.innerHTML=`<div class="pw fade">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:20px">
    <div>
      <div class="pg-h">${c.icon} ${c.name}</div>
      <div class="pg-sub">${c.contractDesc}</div>
      <div class="dimx" style="margin-top:2px">${c.varDesc}</div>
    </div>
    <div style="background:var(--card2);border:1px solid rgba(${th.r},.2);border-radius:12px;padding:14px 20px;text-align:center;flex-shrink:0">
      <div style="font-size:36px;font-weight:800;color:${sc};font-family:'JetBrains Mono',monospace;line-height:1">${v}%</div>
      <div style="font-size:11px;font-weight:700;color:${sc};margin-top:3px">${satL(v)}</div>
      <div class="dimx">saúde do contrato</div>
    </div>
  </div>

  <div class="g3" style="margin-bottom:14px">
    <div class="stat" style="border-left:3px solid ${th.a}">
      <div class="stat-v" style="color:${th.a}">${brl(c.contractVal)}<span style="font-size:13px;color:var(--t3);font-family:'DM Sans',sans-serif">/mês</span></div>
      <div class="stat-l">Receita Fixa</div>
    </div>
    <div class="stat">
      <div class="stat-v" style="color:${c.varVal>0?'#16A854':'var(--t3)'}">${c.varVal>0?brl(c.varVal):'—'}</div>
      <div class="stat-l">Receita Variável</div>
      <div class="stat-s">${c.varDesc}</div>
    </div>
    <div class="stat" style="border-left:3px solid #E8A820">
      <div style="font-size:12px;font-weight:600;color:#E8A820;line-height:1.5">${c.upsell}</div>
      <div class="stat-l" style="margin-top:6px">Oportunidade</div>
    </div>
  </div>

  <!-- SAT OVERRIDE -->
  <div class="card card-xs" style="margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span class="dimx">Satisfação manual:</span>
    ${[null,40,60,75,90,100].map(val=>`
    <button class="sat-btn${st.satOvr[id]===val?' active':''}"
      style="color:${val===null?'var(--t3)':satC(val)}"
      onclick="setSat('${id}',${JSON.stringify(val)})">
      ${val===null?'Auto':val+'%'}
    </button>`).join('')}
  </div>

  <!-- DELIVERIES -->
  <div class="card" style="margin-bottom:14px">
    <div class="sec-lbl" style="margin-bottom:12px">📋 Entregas do Contrato</div>
    <div id="del-${id}"></div>
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--b)">
      <div class="bar bar-md"><div class="bar-f" id="del-bar-${id}" style="width:${Math.round(done/c.deliveries.length*100)}%;background:${th.a}"></div></div>
      <div class="dimx" style="margin-top:5px" id="del-cnt-${id}">${done}/${c.deliveries.length} entregas em dia</div>
    </div>
  </div>

  <!-- EXTRAS -->
  <div class="card" style="border-color:rgba(${th.r},.18)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="sec-lbl" style="color:${th.a};margin:0">⚡ Demandas Extras do Cliente</div>
      <button class="btn btn-g btn-sm" onclick="toggleForm('${id}')">+ Adicionar</button>
    </div>
    <div class="add-form" id="form-${id}">
      <input class="inp" id="et-${id}" placeholder="Descreva a demanda..." style="margin-bottom:8px">
      <div class="g2" style="gap:8px;margin-bottom:8px">
        <input class="inp" id="edl-${id}" placeholder="Prazo (ex: Sexta-feira)">
        <select class="inp" id="epr-${id}">
          <option value="normal">Normal</option>
          <option value="high">Alta prioridade</option>
          <option value="critical">Crítico</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-a" style="background:${th.a}" onclick="addExtra('${id}')">Salvar demanda</button>
        <button class="btn btn-g" onclick="toggleForm('${id}')">Cancelar</button>
      </div>
    </div>
    <div id="ext-${id}"></div>
  </div>

  </div>`;

  renderDeliveries(id);
  renderExtras(id);
}

function renderDeliveries(id){
  const c=CLIENTS[id];const th=TH[c.theme]||TH.home;
  const sv=st.deliveries[id]||{};
  const el=document.getElementById('del-'+id);if(!el)return;
  el.innerHTML=c.deliveries.map(d=>{
    const isDone=sv[d.id]!==undefined?sv[d.id]:d.done;
    const urg=!isDone&&isUrg(d.due);
    return`<div class="del-row">
      <div class="chk${isDone?' on':''}" style="background:${isDone?th.a:'transparent'};border-color:${isDone?th.a:'rgba(255,255,255,.2)'}"
        onclick="togDel('${id}','${d.id}')">${isDone?'✓':''}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;text-decoration:${isDone?'line-through':'none'};color:${isDone?'var(--t3)':'var(--t1)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.t}</div>
        <div class="dimx" style="margin-top:1px">${d.freq} · ${d.due}</div>
      </div>
      ${urg?'<span class="urg-tag">urgente</span>':isDone?'<span class="ok-tag">✓ ok</span>':''}
    </div>`;
  }).join('');
  const doneN=c.deliveries.filter(d=>(sv[d.id]!==undefined?sv[d.id]:d.done)).length;
  const bar=document.getElementById('del-bar-'+id),cnt=document.getElementById('del-cnt-'+id);
  if(bar)bar.style.width=Math.round(doneN/c.deliveries.length*100)+'%';
  if(cnt)cnt.textContent=doneN+'/'+c.deliveries.length+' entregas em dia';
}

function renderExtras(id){
  const el=document.getElementById('ext-'+id);if(!el)return;
  const list=st.extras[id]||[];
  if(!list.length){el.innerHTML=`<div class="dimx" style="text-align:center;padding:16px 0">Nenhuma demanda extra cadastrada</div>`;return;}
  const th=TH[CLIENTS[id]?.theme]||TH.home;
  el.innerHTML=list.map(e=>`<div class="extra-item" style="opacity:${e.done?.38:1}">
    <div class="chk${e.done?' on':''}" style="background:${e.done?th.a:'transparent'};border-color:${e.done?th.a:priC(e.priority)};margin-top:1px"
      onclick="togExtra('${id}','${e.id}')">${e.done?'✓':''}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:500;text-decoration:${e.done?'line-through':'none'};line-height:1.35">${e.t}</div>
      <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center">
        ${e.deadline?`<span class="dimx">📅 ${e.deadline}</span>`:''}
        <span style="font-size:10px;font-weight:700;color:${priC(e.priority)}">${e.priority}</span>
      </div>
    </div>
  </div>`).join('');
}

function togDel(id,did){
  if(!st.deliveries[id])st.deliveries[id]={};
  const c=CLIENTS[id];const d=c.deliveries.find(x=>x.id===did);
  const was=st.deliveries[id][did]!==undefined?st.deliveries[id][did]:d.done;
  st.deliveries[id][did]=!was;
  st.xp+=was?-10:10;st.xp=Math.max(0,st.xp);
  save();renderDeliveries(id);updateTop();
}
function togExtra(id,eid){
  st.extras[id]=(st.extras[id]||[]).map(e=>e.id===eid?{...e,done:!e.done}:e);
  save();renderExtras(id);
}
function toggleForm(id){const el=document.getElementById('form-'+id);if(el)el.style.display=el.style.display==='block'?'none':'block';}
function addExtra(id){
  const t=document.getElementById('et-'+id)?.value.trim();if(!t)return;
  const dl=document.getElementById('edl-'+id)?.value||'';
  const pr=document.getElementById('epr-'+id)?.value||'normal';
  if(!st.extras[id])st.extras[id]=[];
  st.extras[id].push({id:id+'-e'+Date.now(),t,deadline:dl,priority:pr,done:false});
  save();toggleForm(id);renderExtras(id);
}
function setSat(id,v){
  st.satOvr[id]=v;save();
  renderClient(document.getElementById('main'),id);updateTop();
}

/* ═══════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════ */
function renderTimer(el){
  el.innerHTML=`<div class="pw fade" style="max-width:580px">
  <div class="pg-h" style="margin-bottom:20px">⏱ Cronômetro</div>
  <div class="card" style="text-align:center;padding:36px 28px;border-color:${tmrRunning?`rgba(239,68,68,.35)`:'var(--b)'}">
    <div id="timer-disp" class="mono" style="font-size:60px;font-weight:700;letter-spacing:5px;color:${tmrRunning?'#EF4444':'var(--t1)'};margin-bottom:18px;transition:color .2s">${fT(tmrSecs)}</div>
    <input class="inp" id="tmr-lbl-inp" value="${tmrLabel}" placeholder="Nome da sessão..."
      oninput="tmrLabel=this.value;const tl=document.getElementById('tmr-top-lbl');if(tl)tl.textContent=this.value"
      style="max-width:360px;margin:0 auto 18px;text-align:center;display:block;font-size:14px">
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button onclick="tmrRunning?tmrPause():tmrStart();render()" class="btn"
        style="background:${tmrRunning?'rgba(255,255,255,.08)':'#EF4444'};color:${tmrRunning?'var(--t1)':'white'};padding:11px 32px;font-size:14px">
        ${tmrRunning?'⏸ Pausar':'▶ Iniciar'}
      </button>
      <button onclick="timerStop()" class="btn btn-danger" style="padding:11px 22px">⏹ Parar</button>
      <button onclick="tmrSecs=0;tmrRunning=false;clearInterval(tmrIv);render()" class="btn btn-g" style="padding:11px 16px">↺</button>
    </div>
  </div>
  </div>`;
  if(tmrRunning){clearInterval(tmrIv);tmrIv=setInterval(tmrTick,1000);}
}

/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
function renderConfig(el){
  el.innerHTML=`<div class="pw fade" style="max-width:520px">
  <div class="pg-h" style="margin-bottom:20px">⚙️ Config</div>
  <div class="card">
    <div class="sec-lbl">Dados e progresso</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 16px">
      <button class="btn btn-g" onclick="exportData()">📥 Exportar progresso</button>
      <button class="btn btn-danger" onclick="if(confirm('Resetar tudo?')&&confirm('Confirme novamente.')){localStorage.removeItem('mrc10');location.reload();}">⚠ Resetar tudo</button>
    </div>
    <div style="background:var(--card2);border-radius:9px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);line-height:2">
      XP: ${st.xp} · Nível: ${lvl().n}<br>
      Ações concluídas: ${Object.keys(st.taskDone).filter(k=>st.taskDone[k]).length}<br>
      Entregas: ${Object.values(st.deliveries).flatMap(Object.values).filter(Boolean).length}<br>
      MRC OS v10 · 2025
    </div>
  </div>
  </div>`;
}
function exportData(){
  const lines=['# MRC OS v10 — Progresso',new Date().toLocaleDateString('pt-BR'),'','XP: '+st.xp,'Nível: '+lvl().n,'','Ações concluídas:',...Object.entries(st.taskDone).filter(([,v])=>v).map(([k])=>'- '+k)];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download='mrc-progress.txt';a.click();
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
applyT('home');
updateTop();
render();
</script>
